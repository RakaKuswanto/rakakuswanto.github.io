<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pro Screener Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --accent: #10b981;
            --accent-dark: #059669;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --border-color: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
        }

        html {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2942 100%);
            min-height: 100vh;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: "rlig" 1, "calt" 1;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.3px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
            transition: background 0.2s;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* Smooth Animations */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 0%, #334155 50%, var(--bg-card) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .animate-fade-in { animation: fade-in 0.6s ease-out; }
        input[type="date"] { color-scheme: dark; }
        * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease; }

        /* Professional Card Styles */
        .card-base {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card-base:hover {
            background: rgba(30, 41, 59, 0.65);
            border-color: rgba(6, 182, 212, 0.3);
        }

        /* Metric Cards */
        .metric-card {
            padding: 1.25rem;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .metric-card:hover::before { opacity: 1; }
        .metric-label {
            font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem;
        }
        .metric-value {
            font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -1px;
        }
        @media (min-width: 640px) { .metric-value { font-size: 28px; } }
        .metric-sub { font-size: 11px; font-weight: 600; margin-top: 0.75rem; }

        /* Badge Styles */
        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-info { background: rgba(6, 182, 212, 0.15); color: #67e8f9; border: 1px solid rgba(6, 182, 212, 0.3); }
        .badge-warning { background: rgba(251, 146, 60, 0.15); color: #fdba74; border: 1px solid rgba(251, 146, 60, 0.3); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }

        /* Button Styles */
        .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.2);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(6, 182, 212, 0.3); }
        .btn-ghost { background: rgba(71, 85, 105, 0.3); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { background: rgba(71, 85, 105, 0.5); border-color: var(--primary); color: var(--text-primary); }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { border-bottom: 2px solid var(--border-color); background: rgba(15, 23, 42, 0.5); }
        th {
            padding: 12px 16px; text-align: left; font-weight: 600;
            color: var(--text-muted); letter-spacing: 0.3px; text-transform: uppercase; font-size: 11px;
        }
        td { padding: 14px 16px; border-bottom: 1px solid rgba(71, 85, 105, 0.3); }
        tbody tr:hover { background: rgba(6, 182, 212, 0.05); border-bottom-color: rgba(6, 182, 212, 0.3); }
        tbody tr:last-child td { border-bottom: none; }

        /* Mobile specific table adjustments */
        @media (max-width: 639px) {
            th, td { padding: 12px 12px; }
        }

        .stock-link {
            font-weight: 600; color: var(--primary); text-decoration: none;
            border-bottom: 2px solid transparent;
        }
        .stock-link:hover { color: var(--primary-dark); border-bottom-color: var(--primary); }

        /* Filter Bar */
        .filter-bar {
            background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(71, 85, 105, 0.4);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .filter-chip {
            padding: 6px 14px; border-radius: 20px; background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.3); color: var(--text-secondary);
            font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
        }
        .filter-chip.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(6, 182, 212, 0.25);
        }

        /* Loading & Header */
        .loader {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(6, 182, 212, 0.3); border-radius: 50%;
            border-top-color: var(--primary); animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .price-display { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .price-change { font-size: 11px; font-weight: 600; margin-top: 4px; }
        .price-change.positive { color: #6ee7b7; }
        .price-change.negative { color: #fca5a5; }
        .price-change.neutral { color: var(--text-muted); }

        .page-header {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(16, 185, 129, 0.05));
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            padding: 2rem 0; margin-bottom: 2rem; border-radius: 0 0 16px 16px;
        }
        .header-title { font-size: 24px; font-weight: 700; letter-spacing: -1px; display: flex; align-items: center; gap: 12px; margin-bottom: 0.5rem; }
        @media (min-width: 640px) { .header-title { font-size: 28px; } }
        .header-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .header-subtitle { color: var(--text-muted); font-size: 12px; font-weight: 500; letter-spacing: 0.3px; }
        @media (min-width: 640px) { .header-subtitle { font-size: 13px; } }

        .empty-state { text-align: center; padding: 3rem 2rem; }
    </style>
</head>
<body class="min-h-screen">

    <div class="page-header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-start justify-between mb-2 sm:mb-4">
                <div class="flex-1">
                    <div class="header-title">
                        <div class="header-icon">
                            <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                            </svg>
                        </div>
                        <span>Sistem Cuan Pro</span>
                    </div>
                    <p class="header-subtitle mt-2 sm:mt-0">Algoritma & Fundamental Trading Real-time</p>
                </div>
                <div class="flex flex-col items-end gap-2 sm:flex-row sm:items-center sm:gap-3">
                    <div id="last-updated" class="text-[10px] sm:text-xs font-mono text-right bg-slate-800/30 px-2 sm:px-3 py-1.5 rounded-lg border border-slate-700/50">Updating...</div>
                    <button id="refresh-btn" class="btn btn-ghost" title="Refresh Data">
                        <svg class="w-4 h-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        
        <div id="summary-container" class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 sm:mb-8 animate-fade-in">
            <div class="card-base metric-card skeleton h-24 sm:h-28"></div>
            <div class="card-base metric-card skeleton h-24 sm:h-28"></div>
            <div class="card-base metric-card skeleton h-24 sm:h-28"></div>
            <div class="card-base metric-card skeleton h-24 sm:h-28"></div>
        </div>

        <div class="filter-bar p-2.5 sm:p-3 mb-6 sticky top-2 z-30 rounded-xl sm:rounded-2xl">
            <div class="flex flex-col sm:flex-row items-center gap-3">
                <div class="relative w-full sm:w-auto">
                    <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                        <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <input type="date" id="manual-date-picker" class="pl-10 pr-3 py-2 bg-slate-950/30 border border-slate-700/50 rounded-lg text-sm text-white focus:ring-1 focus:ring-cyan-500 focus:border-cyan-500 block w-full outline-none transition-all cursor-pointer hover:bg-slate-900/50" />
                </div>
                <div class="flex-1 w-full overflow-hidden">
                    <div id="date-list-container" class="flex items-center gap-2 overflow-x-auto hide-scrollbar scroll-smooth px-1 sm:px-2 pb-1 sm:pb-0"></div>
                </div>
                <div class="w-full sm:w-auto sm:border-l border-slate-700/50 sm:pl-3" id="screener-filter-container"></div>
            </div>
        </div>

        <div class="card-base rounded-xl sm:rounded-2xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr>
                            <th class="w-1/2 sm:w-auto">Emiten & Info</th>
                            <th class="hidden md:table-cell">Fundamental</th>
                            <th class="hidden lg:table-cell text-right">Hold</th>
                            <th class="text-right w-1/2 sm:w-auto">Harga & Analisis</th>
                            <th class="hidden sm:table-cell text-center w-36">Candle 5D</th>
                            <th class="hidden md:table-cell text-right w-28">Vol Scan</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body">
                        <tr>
                            <td colspan="6" class="empty-state">
                                <div class="loader" style="margin: 0 auto;"></div>
                                <p style="margin-top: 1rem; color: var(--text-muted);">Loading stocks...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div id="load-more-container" class="p-4 sm:p-6 text-center border-t border-slate-700/50"></div>
        </div>

    </div>

    <script>
        const CONFIG = {
            SUPABASE_URL: 'https://yvmfenyirwzmgbzzrbfw.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bWZlbnlpcnd6bWdienpyYmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1ODI0NDIsImV4cCI6MjA3MzE1ODQ0Mn0.i2Yjxa2LZbXEzi6amZpptPAnyLoeAirADdWsW47ZVcA',
            ITEMS_PER_PAGE: 50
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        
        const state = { data: [], filters: { date: null, screener: null }, page: 1, loading: false, hasMore: true, totalDisplayed: 0 };
        const el = {
            tableBody: document.getElementById('stock-table-body'),
            dateContainer: document.getElementById('date-list-container'),
            screenerContainer: document.getElementById('screener-filter-container'),
            loadMore: document.getElementById('load-more-container'),
            summary: document.getElementById('summary-container'),
            datePicker: document.getElementById('manual-date-picker'),
            lastUpdated: document.getElementById('last-updated')
        };

        const formatIDR = (n) => n ? new Intl.NumberFormat('id-ID').format(Math.round(n)) : '-';
        const formatDateShort = (d) => new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        const getDaysHeld = (d) => Math.max(0, Math.floor((new Date() - new Date(d)) / (86400000)));

        const getStatusBadge = (status) => {
            if (!status || status === 'N/A' || status === 'null') return `<span class="text-slate-500">-</span>`;
            if (status.includes('🔥') || status.includes('Strong Buy') || status.includes('🟢')) return `<span class="badge badge-success">🔥 Strong Buy</span>`;
            if (status.includes('💎') || status.includes('WONDERFUL')) return `<span class="badge badge-info">💎 Wonderful</span>`;
            if (status.includes('💡') || status.includes('🟡')) return `<span class="badge badge-warning">💡 Hold</span>`;
            if (status.includes('⛔') || status.includes('🚨') || status.includes('Hindari') || status.includes('Minus') || status.includes('🔴')) return `<span class="badge badge-danger">⛔ Hindari</span>`;
            return `<span class="badge" style="background: rgba(71, 85, 105, 0.2); border: 1px solid rgba(71, 85, 105, 0.4); color: var(--text-muted);">${status}</span>`;
        };

        function getGroupedData(items) {
            const map = new Map();
            const result = [];
            items.forEach(item => {
                const key = `${item.scan_date}_${item.stock_code}`;
                if (!map.has(key)) {
                    const newItem = { ...item, screener_names: [item.screener_name] };
                    map.set(key, newItem); result.push(newItem);
                } else {
                    const existingItem = map.get(key);
                    if (!existingItem.screener_names.includes(item.screener_name)) existingItem.screener_names.push(item.screener_name);
                }
            });
            return result;
        }

        async function initFilters() {
            try {
                const { data, error } = await supabaseClient.rpc('get_distinct_screener_filters');
                if (error) throw error;
                const dates = data.distinct_dates.map(i => i.scan_date).sort((a, b) => new Date(b) - new Date(a));
                if (dates.length > 0) {
                    if (!state.filters.date) { state.filters.date = dates[0]; el.datePicker.value = dates[0]; }
                    renderDateCapsules(dates);
                }
                const screeners = data.distinct_screeners.map(i => i.screener_name).sort();
                renderScreenerFilters(screeners);
            } catch (e) { console.error("Filter init failed:", e); }
        }

        function renderDateCapsules(allDates) {
            const recentDates = allDates.slice(0, 10); 
            el.dateContainer.innerHTML = recentDates.map(date => {
                const isActive = state.filters.date === date;
                return `<button onclick="handleDateClick('${date}')" class="filter-chip ${isActive ? 'active' : ''}">${formatDateShort(date)}</button>`;
            }).join('');
        }

        function renderScreenerFilters(screeners) {
            const html = `
                <select onchange="handleScreenerChange(this.value)" class="w-full sm:w-auto" style="background: rgba(71, 85, 105, 0.2); border: 1px solid rgba(71, 85, 105, 0.4); color: var(--text-secondary); border-radius: 8px; padding: 8px 12px; outline: none; font-size: 13px; font-weight: 500; cursor: pointer;">
                    <option value="" style="background: var(--bg-card); color: var(--text-primary);">Semua Strategi</option>
                    ${screeners.map(s => `<option value="${s}" style="background: var(--bg-card); color: var(--text-primary);" ${state.filters.screener === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
            `;
            el.screenerContainer.innerHTML = html;
        }

        window.handleDateClick = (date) => { el.datePicker.value = date; applyFilter('date', date); };
        el.datePicker.addEventListener('change', (e) => applyFilter('date', e.target.value));
        window.handleScreenerChange = (val) => applyFilter('screener', val === "" ? null : val);

        async function applyFilter(type, value) {
            if (state.filters[type] === value) return;
            state.filters[type] = value;
            if(type === 'date') initFilters();
            resetData();
            await fetchData();
        }

        async function fetchData() {
            if (state.loading || !state.hasMore) return;
            state.loading = true; renderLoadMore();

            try {
                const from = (state.page - 1) * CONFIG.ITEMS_PER_PAGE;
                const to = from + CONFIG.ITEMS_PER_PAGE - 1;

                let query = supabaseClient.from('screener_results').select('*')
                    .order('scan_date', { ascending: false }).order('stock_code').range(from, to);

                if (state.filters.date) query = query.eq('scan_date', state.filters.date);
                if (state.filters.screener) query = query.eq('screener_name', state.filters.screener);

                const { data, error } = await query;
                if (error) throw error;

                if (data.length < CONFIG.ITEMS_PER_PAGE) state.hasMore = false;

                state.data.push(...data);
                state.totalDisplayed += data.length;
                state.page++;

                const groupedData = getGroupedData(state.data);
                renderRows(groupedData);
                updateSummary(groupedData);
                await fetchPricesFromEdge(groupedData);

            } catch (e) {
                console.error(e); el.loadMore.innerHTML = `<span style="color: #fca5a5; font-size: 13px;">Gagal memuat data</span>`;
            } finally {
                state.loading = false; renderLoadMore();
            }
        }

        async function fetchPricesFromEdge(groupedItems) {
            if (groupedItems.length === 0) return;
            const BATCH_SIZE = 20;

            for (let i = 0; i < groupedItems.length; i += BATCH_SIZE) {
                const batch = groupedItems.slice(i, i + BATCH_SIZE);
                const tickers = batch.map(item => item.stock_code).join(',');

                try {
                    const res = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/get-price?tickers=${tickers}`);
                    if (!res.ok) throw new Error('Gagal fetch edge function');
                    const liveData = await res.json();

                    liveData.forEach(data => {
                        if (data.error) return;

                        // 1. Update Harga, PnL, & Bollinger Bands
                        const priceCell = document.querySelector(`#price-cell-${data.ticker}`);
                        const originalItem = batch.find(b => b.stock_code === data.ticker);

                        if (priceCell && data.price) {
                            let pnlHtml = '';
                            if (originalItem && originalItem.entry_price) {
                                const pnl = ((data.price - originalItem.entry_price) / originalItem.entry_price) * 100;
                                const color = pnl > 0 ? 'positive' : (pnl < 0 ? 'negative' : 'neutral');
                                const sign = pnl > 0 ? '+' : '';
                                pnlHtml = `<div class="price-change ${color}">${sign}${pnl.toFixed(2)}% vs Scan</div>`;
                            }

                            // Render Bollinger Band Status
                            let bbBadgeHtml = '';
                            if (data.bbStatus) {
                                let bbClass = 'badge';
                                if (data.bbStatus.includes('Upper 🔥')) bbClass = 'badge-danger';
                                else if (data.bbStatus.includes('Upper Half')) bbClass = 'badge-info';
                                else if (data.bbStatus.includes('Lower Half')) bbClass = 'badge-warning';
                                else if (data.bbStatus.includes('Lower 🧊')) bbClass = 'badge-success';

                                bbBadgeHtml = `<div class="mt-1.5"><span class="badge ${bbClass}" style="font-size: 9px; padding: 2px 6px;">BB: ${data.bbStatus}</span></div>`;
                            }

                            priceCell.innerHTML = `
                                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                                    <div class="price-display">${formatIDR(data.price)}</div>
                                    ${pnlHtml}
                                    ${bbBadgeHtml}
                                </div>
                            `;
                        }

                        // 2. Update Candlestick Chart 5D
                        const chartEl = document.querySelector(`#chart-${data.ticker}`);
                        if (chartEl && data.historyOHLC && data.historyOHLC.length > 0) {
                            chartEl.innerHTML = '';
                            new ApexCharts(chartEl, {
                                chart: { type: 'candlestick', height: 48, width: 110, sparkline: { enabled: true }, animations: { enabled: false } },
                                series: [{ data: data.historyOHLC }],
                                plotOptions: {
                                    candlestick: {
                                        colors: { upward: '#10b981', downward: '#ef4444' },
                                        wick: { useFillColor: true }
                                    }
                                },
                                tooltip: { theme: 'dark', fixed: { enabled: false }, x: { show: false }, y: { title: { formatter: () => '' } }, marker: { show: false } }
                            }).render();
                        }
                    });
                } catch (error) {
                    console.error("Error fetching batch:", error);
                    batch.forEach(item => {
                        const cell = document.querySelector(`#price-cell-${item.stock_code}`);
                        if (cell) cell.innerHTML = `<span style="font-size: 11px; color: #fca5a5;">API Error</span>`;
                    });
                }
            }
        }

        function renderRows(groupedItems) {
            const html = groupedItems.map(item => {
                const statusBadge = getStatusBadge(item.sector);
                const strategyLabels = item.screener_names.map(name => {
                    const txt = name === 'RADScreener' ? 'RAD + V11' : name;
                    return `<span class="badge badge-info">${txt}</span>`;
                }).join('');

                let volHtml = `<span style="font-size: 12px; color: var(--text-muted);">-</span>`;
                if (item.volume_now) {
                    const volLot = (item.volume_now / 10000).toFixed(0) + 'K';
                    let spikeHtml = '';
                    if (item.volume_10d_avg && item.volume_now > (item.volume_10d_avg * 2)) {
                        const spikePct = Math.round((item.volume_now / item.volume_10d_avg) * 100);
                        spikeHtml = `<div class="badge badge-warning" style="margin-top: 4px; font-size: 9px; padding: 2px 6px;">Vol +${spikePct}%</div>`;
                    }
                    volHtml = `<div style="text-align: right;"><div style="font-weight: 600; color: var(--text-primary); font-size: 12px;">${volLot}</div>${spikeHtml}</div>`;
                }

                return `
                <tr id="row-${item.stock_code}" style="animation: fade-in 0.4s ease-out;">
                    <td>
                        <div style="display: flex; flex-direction: column; gap: 6px;">
                            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                                <a href="https://stockbit.com/symbol/${item.stock_code}" target="_blank" class="stock-link" style="font-size: 14px;">
                                    ${item.stock_code}
                                </a>
                                <div class="md:hidden">
                                    ${statusBadge}
                                </div>
                            </div>
                            <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                                ${strategyLabels}
                            </div>
                        </div>
                    </td>
                    <td class="hidden md:table-cell">${statusBadge}</td>
                    <td class="hidden lg:table-cell text-right" style="color: var(--text-muted); font-size: 12px;">${getDaysHeld(item.scan_date)} Hari</td>
                    <td class="text-right" id="price-cell-${item.stock_code}">
                        <div class="skeleton" style="width: 70px; height: 18px; margin-left: auto; border-radius: 4px;"></div>
                        <div class="skeleton" style="width: 50px; height: 12px; margin-left: auto; border-radius: 4px; margin-top: 6px;"></div>
                    </td>
                    <td class="hidden sm:table-cell text-center p-0">
                        <div id="chart-${item.stock_code}" style="height: 48px; width: 110px; margin: 0 auto; opacity: 0.9;"></div>
                    </td>
                    <td class="hidden md:table-cell text-right">${volHtml}</td>
                </tr>
                `;
            }).join('');
            el.tableBody.innerHTML = html;
        }

        function updateSummary(groupedItems) {
            const totalItems = groupedItems.length;
            let strongBuyCount = 0, wonderfulCount = 0, avoidCount = 0;

            groupedItems.forEach(item => {
                const status = item.sector || "";
                if (status.includes('🔥') || status.includes('Strong Buy') || status.includes('🟢')) strongBuyCount++;
                if (status.includes('💎') || status.includes('WONDERFUL')) wonderfulCount++;
                if (status.includes('⛔') || status.includes('🚨') || status.includes('Hindari') || status.includes('Minus') || status.includes('🔴')) avoidCount++;
            });

            const createCard = (title, value, sub, color) => `
                <div class="card-base metric-card animate-fade-in">
                    <div class="metric-label">${title}</div>
                    <div class="metric-value" style="color: ${color};">${value}</div>
                    <div class="metric-sub" style="color: var(--text-muted);">${sub}</div>
                </div>
            `;

            el.summary.innerHTML = `
                ${createCard('Total Unik', totalItems, 'Emiten Terdeteksi', 'var(--primary)')}
                ${createCard('Strong Buy', strongBuyCount, 'Valuasi Diskon', '#10b981')}
                ${createCard('Wonderful', wonderfulCount, 'Pertumbuhan Kuat', '#06b6d4')}
                ${createCard('Hindari', avoidCount, 'Red Flag / Rugi', '#ef4444')}
            `;
        }

        function renderLoadMore() {
            if (state.loading) {
                el.loadMore.innerHTML = `<div class="loader"></div>`;
            } else if (state.hasMore) {
                el.loadMore.innerHTML = `<button onclick="fetchData()" class="btn btn-primary w-full sm:w-auto">Muat Lebih Banyak</button>`;
            } else {
                el.loadMore.innerHTML = `<span style="font-size: 11px; color: var(--text-muted); letter-spacing: 0.3px; text-transform: uppercase; font-weight: 600;">Semua Data Ditampilkan</span>`;
            }
        }

        function resetData() {
            state.data = []; state.page = 1; state.hasMore = true; state.totalDisplayed = 0;
            el.tableBody.innerHTML = `<tr><td colspan="6" class="empty-state"><div class="loader" style="margin: 0 auto;"></div><p style="margin-top: 1rem; color: var(--text-muted);">Loading stocks...</p></td></tr>`;
            el.loadMore.innerHTML = '';
            el.summary.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;">Memuat statistik...</div>`;
        }

        (async function init() {
            el.lastUpdated.innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute:'2-digit' });
            await initFilters(); await fetchData();
            document.getElementById('refresh-btn').addEventListener('click', () => {
                resetData(); fetchData();
                el.lastUpdated.innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute:'2-digit' });
            });
        })();
    </script>
</body>
</html>

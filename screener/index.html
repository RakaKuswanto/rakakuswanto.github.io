<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pro Screener Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg-dark: #0b1120;
            --card-dark: #1e293b;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            -webkit-font-smoothing: antialiased;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        input[type="date"] {
            color-scheme: dark;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center border border-emerald-500/20">
                        <svg class="w-6 h-6 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
                    </div>
                    Belajar Saham Dari Nol
                </h1>
                <p class="text-slate-400 text-sm mt-1 ml-14">Sistem Algoritma & Fundamental Trading Real-time</p>
            </div>
            
            <div class="flex items-center gap-3">
                <span id="last-updated" class="text-xs font-mono text-slate-500 bg-slate-800/50 px-3 py-1.5 rounded-lg border border-slate-800">Updating...</span>
                <button id="refresh-btn" class="p-2.5 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white rounded-xl border border-slate-700 transition-all active:scale-95" title="Refresh Data">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </header>

        <div id="summary-container" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="skeleton h-28 rounded-2xl border border-slate-800/50"></div>
            <div class="skeleton h-28 rounded-2xl border border-slate-800/50"></div>
            <div class="skeleton h-28 rounded-2xl border border-slate-800/50"></div>
            <div class="skeleton h-28 rounded-2xl border border-slate-800/50"></div>
        </div>

        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-2xl p-1 mb-6 sticky top-2 z-30 shadow-2xl shadow-black/50">
            <div class="flex flex-col sm:flex-row items-center gap-1">
                
                <div class="flex items-center gap-2 p-2 w-full sm:w-auto border-b sm:border-b-0 sm:border-r border-slate-800/50 pr-4">
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-4 w-4 text-slate-400 group-hover:text-emerald-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </div>
                        <input type="date" id="manual-date-picker" class="pl-10 pr-3 py-2 bg-slate-950/50 border border-slate-800 rounded-lg text-sm text-white focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 block w-full outline-none transition-all cursor-pointer hover:bg-slate-900">
                    </div>
                </div>

                <div class="flex-1 w-full overflow-hidden px-2 py-2 sm:py-0">
                    <div id="date-list-container" class="flex items-center gap-2 overflow-x-auto hide-scrollbar scroll-smooth"></div>
                </div>

                <div class="hidden md:flex border-l border-slate-800/50 pl-2" id="screener-filter-container"></div>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-lg">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-xs text-slate-400 uppercase tracking-wider border-b border-slate-800 bg-slate-900/95">
                            <th class="px-6 py-4 font-semibold">Emiten & Strategi</th>
                            <th class="px-6 py-4 font-semibold hidden sm:table-cell">Fundamental</th>
                            <th class="px-6 py-4 font-semibold text-right hidden md:table-cell">Hold</th>
                            <th class="px-6 py-4 font-semibold text-right">Harga Live</th>
                            <th class="px-6 py-4 font-semibold text-center hidden sm:table-cell w-32">Tren 5D</th>
                            <th class="px-6 py-4 font-semibold text-right hidden sm:table-cell w-32">Volume Scan</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body" class="divide-y divide-slate-800 text-sm">
                        </tbody>
                </table>
            </div>
            
            <div id="load-more-container" class="p-6 text-center border-t border-slate-800"></div>
        </div>

    </div>

    <script>
        // ================= CONFIGURATION =================
        const CONFIG = {
            SUPABASE_URL: 'https://yvmfenyirwzmgbzzrbfw.supabase.co',
            SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2bWZlbnlpcnd6bWdienpyYmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc1ODI0NDIsImV4cCI6MjA3MzE1ODQ0Mn0.i2Yjxa2LZbXEzi6amZpptPAnyLoeAirADdWsW47ZVcA',
            ITEMS_PER_PAGE: 50
        };

        const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        
        const state = {
            data: [],
            filters: { date: null, screener: null },
            page: 1,
            loading: false,
            hasMore: true,
            totalDisplayed: 0
        };

        const el = {
            tableBody: document.getElementById('stock-table-body'),
            dateContainer: document.getElementById('date-list-container'),
            screenerContainer: document.getElementById('screener-filter-container'),
            loadMore: document.getElementById('load-more-container'),
            summary: document.getElementById('summary-container'),
            datePicker: document.getElementById('manual-date-picker'),
            lastUpdated: document.getElementById('last-updated')
        };

        // ================= HELPERS =================
        const formatIDR = (n) => n ? new Intl.NumberFormat('id-ID').format(n) : '-';
        const formatDateShort = (d) => new Date(d).toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
        const getDaysHeld = (d) => Math.max(0, Math.floor((new Date() - new Date(d)) / (86400000)));

        const getStatusBadge = (status) => {
            if (!status || status === 'N/A' || status === 'null') return `<span class="text-slate-500">-</span>`;
            if (status.includes('🔥') || status.includes('Strong Buy') || status.includes('🟢')) {
                return `<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">${status}</span>`;
            }
            if (status.includes('💎') || status.includes('WONDERFUL')) {
                return `<span class="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">${status}</span>`;
            }
            if (status.includes('💡') || status.includes('🟡')) {
                return `<span class="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">${status}</span>`;
            }
            if (status.includes('⛔') || status.includes('🚨') || status.includes('Hindari') || status.includes('Minus') || status.includes('🔴')) {
                return `<span class="bg-rose-500/20 text-rose-400 border border-rose-500/30 px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">${status}</span>`;
            }
            return `<span class="bg-slate-700 text-slate-300 border border-slate-600 px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider">${status}</span>`;
        };

        // Mengelompokkan sinyal ganda
        function getGroupedData(items) {
            const map = new Map();
            const result = [];
            items.forEach(item => {
                const key = `${item.scan_date}_${item.stock_code}`;
                if (!map.has(key)) {
                    const newItem = { ...item, screener_names: [item.screener_name] };
                    map.set(key, newItem);
                    result.push(newItem);
                } else {
                    const existingItem = map.get(key);
                    if (!existingItem.screener_names.includes(item.screener_name)) {
                        existingItem.screener_names.push(item.screener_name);
                    }
                }
            });
            return result;
        }

        // ================= FILTER LOGIC =================
        async function initFilters() {
            try {
                const { data, error } = await supabaseClient.rpc('get_distinct_screener_filters');
                if (error) throw error;
                const dates = data.distinct_dates.map(i => i.scan_date).sort((a, b) => new Date(b) - new Date(a));
                if (dates.length > 0) {
                    if (!state.filters.date) {
                        state.filters.date = dates[0];
                        el.datePicker.value = dates[0];
                    }
                    renderDateCapsules(dates);
                }
                const screeners = data.distinct_screeners.map(i => i.screener_name).sort();
                renderScreenerFilters(screeners);
            } catch (e) {
                console.error("Filter init failed:", e);
            }
        }

        function renderDateCapsules(allDates) {
            const recentDates = allDates.slice(0, 10); 
            el.dateContainer.innerHTML = recentDates.map(date => {
                const isActive = state.filters.date === date;
                const activeClass = isActive 
                    ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-500/20 border-emerald-400' 
                    : 'bg-slate-800 text-slate-400 border-slate-700 hover:bg-slate-700 hover:text-white';
                return `<button onclick="handleDateClick('${date}')" class="shrink-0 px-4 py-1.5 rounded-lg text-xs font-medium border transition-all duration-200 ${activeClass}">${formatDateShort(date)}</button>`;
            }).join('');
        }

        function renderScreenerFilters(screeners) {
            const html = `
                <select onchange="handleScreenerChange(this.value)" class="bg-slate-950 border border-slate-800 text-xs text-slate-300 rounded-lg px-3 py-2 outline-none focus:border-emerald-500">
                    <option value="">Semua Strategi</option>
                    ${screeners.map(s => `<option value="${s}" ${state.filters.screener === s ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
            `;
            el.screenerContainer.innerHTML = html;
        }

        window.handleDateClick = (date) => { el.datePicker.value = date; applyFilter('date', date); };
        el.datePicker.addEventListener('change', (e) => applyFilter('date', e.target.value));
        window.handleScreenerChange = (val) => applyFilter('screener', val === "" ? null : val);

        async function applyFilter(type, value) {
            if (state.filters[type] === value) return;
            state.filters[type] = value;
            if(type === 'date') initFilters(); 
            resetData();
            await fetchData();
        }

        // ================= DATA FETCHING =================
        async function fetchData() {
            if (state.loading || !state.hasMore) return;
            state.loading = true;
            renderLoadMore();

            try {
                const from = (state.page - 1) * CONFIG.ITEMS_PER_PAGE;
                const to = from + CONFIG.ITEMS_PER_PAGE - 1;

                let query = supabaseClient.from('screener_results')
                    .select('*')
                    .order('scan_date', { ascending: false })
                    .order('stock_code')
                    .range(from, to);

                if (state.filters.date) query = query.eq('scan_date', state.filters.date);
                if (state.filters.screener) query = query.eq('screener_name', state.filters.screener);

                const { data, error } = await query;
                if (error) throw error;

                if (data.length < CONFIG.ITEMS_PER_PAGE) state.hasMore = false;

                state.data.push(...data);
                state.totalDisplayed += data.length;
                state.page++;

                const groupedData = getGroupedData(state.data);

                // 1. Render kerangka tabel dulu (dengan Skeleton loading untuk harga & chart)
                renderRows(groupedData);
                updateSummary(groupedData);
                
                // 2. Tarik Harga Live & Data Sparkline dari Edge Function
                await fetchPricesFromEdge(groupedData);

            } catch (e) {
                console.error(e);
                el.loadMore.innerHTML = `<span class="text-red-500 text-sm">Gagal memuat data</span>`;
            } finally {
                state.loading = false;
                renderLoadMore();
            }
        }

        // ================= FETCH LIVE FROM EDGE FUNCTION =================
        async function fetchPricesFromEdge(groupedItems) {
            if (groupedItems.length === 0) return;

            // Batching: Yahoo API bisa error jika URL terlalu panjang. Tarik per 20 saham.
            const BATCH_SIZE = 20;
            for (let i = 0; i < groupedItems.length; i += BATCH_SIZE) {
                const batch = groupedItems.slice(i, i + BATCH_SIZE);
                const tickers = batch.map(item => item.stock_code).join(',');

                try {
                    // Panggil nama Edge Function kamu sesuai yang dideploy (get-price)
                    const res = await fetch(`${CONFIG.SUPABASE_URL}/functions/v1/get-price?tickers=${tickers}`);
                    if (!res.ok) throw new Error('Gagal fetch edge function');
                    
                    const liveData = await res.json();

                    liveData.forEach(data => {
                        if (data.error) return;

                        // --- 1. Update Harga & PnL Sementara ---
                        const priceCell = document.querySelector(`#price-cell-${data.ticker}`);
                        const originalItem = batch.find(b => b.stock_code === data.ticker);
                        
                        if (priceCell && data.price) {
                            let pnlHtml = '';
                            if (originalItem && originalItem.entry_price) {
                                const pnl = ((data.price - originalItem.entry_price) / originalItem.entry_price) * 100;
                                const color = pnl > 0 ? 'text-emerald-400' : (pnl < 0 ? 'text-rose-400' : 'text-slate-400');
                                const sign = pnl > 0 ? '+' : '';
                                pnlHtml = `<div class="text-[10px] ${color} mt-0.5">${sign}${pnl.toFixed(2)}% vs Scan</div>`;
                            }
                            priceCell.innerHTML = `
                                <div class="font-mono text-white font-medium">${formatIDR(data.price)}</div>
                                ${pnlHtml}
                            `;
                        } else if (priceCell) {
                             priceCell.innerHTML = `<span class="text-slate-500">-</span>`;
                        }

                        // --- 2. Update Sparkline 5D Chart ---
                        const chartEl = document.querySelector(`#chart-${data.ticker}`);
                        if (chartEl && data.history5D && data.history5D.length > 1) {
                            chartEl.innerHTML = ''; // Hapus kotak skeleton
                            
                            const history = data.history5D;
                            const isUp = history[history.length - 1] >= history[0];
                            const chartColor = isUp ? '#10b981' : '#ef4444';

                            new ApexCharts(chartEl, {
                                chart: { type: 'area', height: 40, width: 90, sparkline: { enabled: true }, animations: { enabled: false } },
                                stroke: { curve: 'smooth', width: 2 },
                                fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.0, stops: [0, 100] } },
                                series: [{ data: history }],
                                colors: [chartColor],
                                tooltip: { fixed: { enabled: false }, x: { show: false }, y: { title: { formatter: () => '' } }, marker: { show: false } }
                            }).render();
                        } else if (chartEl) {
                             chartEl.innerHTML = '<span class="text-[10px] text-slate-600 flex items-center justify-center h-full">-</span>';
                        }
                    });
                } catch (error) {
                    console.error("Error fetching batch:", error);
                    batch.forEach(item => {
                        const cell = document.querySelector(`#price-cell-${item.stock_code}`);
                        if (cell) cell.innerHTML = `<span class="text-xs text-rose-500">API Timeout</span>`;
                    });
                }
            }
        }

        // ================= RENDERING TABLE =================
        function renderRows(groupedItems) {
            const html = groupedItems.map(item => {
                const statusBadge = getStatusBadge(item.sector);
                
                const strategyLabels = item.screener_names.map(name => {
                    if (name === 'RADScreener') return `<span class="text-purple-400 bg-purple-500/10 border border-purple-500/20 px-2 py-0.5 rounded text-[10px] uppercase font-bold whitespace-nowrap shadow-sm">RAD + V11</span>`;
                    return `<span class="text-blue-400 bg-blue-500/10 border border-blue-500/20 px-2 py-0.5 rounded text-[10px] uppercase font-bold whitespace-nowrap shadow-sm">${name}</span>`;
                }).join('<span class="w-1.5 inline-block"></span>');

                // Volume Indicator
                let volHtml = `<span class="text-xs font-mono text-slate-500">-</span>`;
                if (item.volume_now) {
                    const volLot = (item.volume_now / 10000).toFixed(0) + 'K Lot';
                    let spikeHtml = '';
                    if (item.volume_10d_avg && item.volume_now > (item.volume_10d_avg * 2)) {
                        const spikePct = Math.round((item.volume_now / item.volume_10d_avg) * 100);
                        spikeHtml = `<span class="text-[10px] font-bold text-amber-400 bg-amber-400/10 px-1.5 py-0.5 rounded mt-1 border border-amber-400/20">🔥 VOL +${spikePct}%</span>`;
                    }
                    volHtml = `<div class="flex flex-col items-end"><span class="font-mono text-slate-300">${volLot}</span>${spikeHtml}</div>`;
                }

                return `
                <tr id="row-${item.stock_code}" class="group hover:bg-slate-800/40 transition-colors border-b border-slate-800/50 last:border-0">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2 flex-wrap">
                            <a href="https://stockbit.com/symbol/${item.stock_code}" target="_blank" class="font-bold text-white text-base hover:text-emerald-400 transition-colors">
                                ${item.stock_code}
                            </a>
                            <div class="flex items-center flex-wrap gap-y-1 mt-0.5">
                                ${strategyLabels}
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 hidden sm:table-cell">${statusBadge}</td>
                    <td class="px-6 py-4 text-right hidden md:table-cell text-slate-400 text-sm">${getDaysHeld(item.scan_date)} Hari</td>
                    
                    <td class="px-6 py-4 text-right" id="price-cell-${item.stock_code}">
                        <div class="skeleton h-5 w-20 ml-auto rounded"></div>
                    </td>
                    
                    <td class="px-6 py-4 hidden sm:table-cell p-0 text-center">
                        <div id="chart-${item.stock_code}" class="h-10 w-24 mx-auto opacity-80 group-hover:opacity-100 transition-opacity">
                            <div class="skeleton h-full w-full rounded"></div>
                        </div>
                    </td>
                    
                    <td class="px-6 py-4 text-right hidden sm:table-cell">${volHtml}</td>
                </tr>
                `;
            }).join('');
            
            el.tableBody.innerHTML = html;
        }

        // ================= SUMMARY =================
        function updateSummary(groupedItems) {
            const totalItems = groupedItems.length;
            let strongBuyCount = 0, wonderfulCount = 0, avoidCount = 0;

            groupedItems.forEach(item => {
                const status = item.sector || "";
                if (status.includes('🔥') || status.includes('Strong Buy') || status.includes('🟢')) strongBuyCount++;
                if (status.includes('💎') || status.includes('WONDERFUL')) wonderfulCount++;
                if (status.includes('⛔') || status.includes('🚨') || status.includes('Hindari') || status.includes('Minus') || status.includes('🔴')) avoidCount++;
            });
            
            const createCard = (title, value, sub, color) => `
                <div class="bg-slate-900/50 backdrop-blur border border-slate-800 p-5 rounded-2xl flex flex-col justify-between h-full">
                    <div class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2">${title}</div>
                    <div class="flex items-end gap-2">
                        <div class="text-2xl lg:text-3xl font-bold text-white">${value}</div>
                        <div class="text-xs font-medium mb-1.5 ${color}">${sub}</div>
                    </div>
                </div>
            `;

            el.summary.innerHTML = `
                ${createCard('Total Unik', totalItems, 'Emiten Terdeteksi', 'text-slate-500')}
                ${createCard('Strong Buy 🔥', strongBuyCount, 'Valuasi Diskon', 'text-emerald-400')}
                ${createCard('Wonderful 💎', wonderfulCount, 'Pertumbuhan Kuat', 'text-blue-400')}
                ${createCard('Hindari ⛔', avoidCount, 'Red Flag / Rugi', 'text-rose-400')}
            `;
        }

        function renderLoadMore() {
            if (state.loading) {
                el.loadMore.innerHTML = `<div class="inline-block h-6 w-6 animate-spin rounded-full border-2 border-slate-600 border-r-emerald-500"></div>`;
            } else if (state.hasMore) {
                el.loadMore.innerHTML = `<button onclick="fetchData()" class="text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-500 px-6 py-2.5 rounded-full transition-all shadow-lg shadow-emerald-900/20">Muat Lebih Banyak</button>`;
            } else {
                el.loadMore.innerHTML = `<span class="text-xs text-slate-600 font-medium uppercase tracking-widest">Semua Data Ditampilkan</span>`;
            }
        }

        function resetData() {
            state.data = [];
            state.page = 1;
            state.hasMore = true;
            state.totalDisplayed = 0;
            el.tableBody.innerHTML = '';
            el.loadMore.innerHTML = '';
            el.summary.innerHTML = `<div class="col-span-4 text-center py-4 text-slate-500">Memuat statistik...</div>`;
        }

        // INIT
        (async function init() {
            el.lastUpdated.innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute:'2-digit' });
            await initFilters();
            await fetchData();
            
            document.getElementById('refresh-btn').addEventListener('click', () => {
                resetData();
                fetchData();
                el.lastUpdated.innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute:'2-digit' });
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>RAD Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #131722; color: #d1d4dc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        
        .container {
            background-color: #1e222d;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }

        h2 { text-align: center; margin-top: 0; color: #fff; }

        .search-box {
            display: flex; gap: 10px; margin-bottom: 25px;
        }
        .search-box input {
            flex: 1; padding: 12px; border-radius: 6px;
            border: 1px solid #363c4e; background-color: #131722; color: #fff;
            font-size: 16px; text-transform: uppercase;
        }
        .search-box button {
            padding: 12px 24px; border-radius: 6px; border: none;
            background-color: #2962ff; color: white; font-weight: bold;
            cursor: pointer; transition: background 0.2s; font-size: 16px;
        }
        .search-box button:hover { background-color: #1e4bd8; }
        .search-box button:disabled { background-color: #363c4e; cursor: not-allowed; }

        table { 
            width: 100%; border-collapse: collapse; 
            margin-top: 10px; background-color: #131722;
            border-radius: 8px; overflow: hidden;
        }
        th, td { 
            padding: 15px; text-align: right; 
            border-bottom: 1px solid #2a2e39;
        }
        th { background-color: #2a2e39; color: #787b86; font-weight: 600; font-size: 14px; text-align: left;}
        th:not(:first-child) { text-align: right; }
        td:first-child { text-align: left; font-weight: bold; color: #fff; }
        
        .status-row { text-align: center !important; font-size: 18px; font-weight: bold; padding: 20px !important; background-color: #1e222d; }
        
        /* Pewarnaan Angka */
        .text-green { color: #00ff00; }
        .text-red { color: #ff4a4a; }

        .loader {
            display: none; border: 4px solid #2a2e39; border-top: 4px solid #2962ff;
            border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #error-msg { color: #ff4a4a; text-align: center; margin-bottom: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📊 RAD Screener Dashboard</h2>
        
        <div class="search-box">
            <input type="text" id="symbolInput" placeholder="Contoh: BBCA" value="BBCA" onkeypress="handleEnter(event)">
            <button id="btnFetch" onclick="fetchData()">Cek Data</button>
        </div>

        <div id="error-msg"></div>
        <div id="loading" class="loader"></div>

        <table id="radTable" style="display: none;">
            <thead>
                <tr>
                    <td colspan="3" id="rad-status" class="status-row">Memuat...</td>
                </tr>
                <tr>
                    <th>Timeframe</th>
                    <th>Net Volume</th>
                    <th>Signal (EMA)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ST (5 Bar)</td>
                    <td id="rad-st-net">0</td>
                    <td id="rad-st-sig">0</td>
                </tr>
                <tr>
                    <td>MT (20 Bar)</td>
                    <td id="rad-mt-net">0</td>
                    <td id="rad-mt-sig">0</td>
                </tr>
                <tr>
                    <td>LT (200 Bar)</td>
                    <td id="rad-lt-net">0</td>
                    <td id="rad-lt-sig">0</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const CONFIG = {
            supabaseFunctionUrl: `https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy`
        };

        function formatNumber(num) {
            if(num === undefined || num === null || isNaN(num)) return "0";
            let absNum = Math.abs(num);
            let formatted = "0";
            
            if(absNum >= 1e12) formatted = (absNum / 1e12).toFixed(2) + "T";
            else if(absNum >= 1e9) formatted = (absNum / 1e9).toFixed(2) + "B";
            else if(absNum >= 1e6) formatted = (absNum / 1e6).toFixed(2) + "M";
            else if(absNum >= 1e3) formatted = (absNum / 1e3).toFixed(2) + "K";
            else formatted = absNum.toFixed(2);

            return num < 0 ? "-" + formatted : formatted;
        }

        function applyColor(elementId, value) {
            const el = document.getElementById(elementId);
            el.innerText = formatNumber(value);
            el.className = ''; // Reset class
            if (value > 0) el.classList.add('text-green');
            else if (value < 0) el.classList.add('text-red');
        }

        function handleEnter(e) {
            if (e.key === 'Enter') fetchData();
        }

        async function fetchData() {
            let symbol = document.getElementById('symbolInput').value.trim().toUpperCase();
            if (!symbol) return;
            if (!symbol.endsWith('.JK')) symbol += '.JK';

            const btn = document.getElementById('btnFetch');
            const loader = document.getElementById('loading');
            const table = document.getElementById('radTable');
            const errorMsg = document.getElementById('error-msg');

            // Reset UI
            btn.disabled = true;
            table.style.display = 'none';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';

            // Ambil data 3 bulan terakhir agar aman (karena butuh perhitungan MA)
            const to = Math.floor(Date.now() / 1000);
            const from = to - (90 * 24 * 60 * 60); 

            const url = `${CONFIG.supabaseFunctionUrl}?endpoint=bars&symbol=${symbol}&interval=1d&from=${from}&to=${to}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Gagal mengambil data saham.");
                
                const data = await response.json();
                
                if (!data.chart || !data.chart.result || data.chart.error) {
                    throw new Error("Kode saham tidak ditemukan / data kosong.");
                }

                const result = data.chart.result[0];
                const radData = result.indicators.rad;

                if (!radData || !radData.dashboard) {
                    throw new Error("Kalkulasi RAD gagal dari server Deno.");
                }

                const dash = radData.dashboard;

                // Update UI Tabel
                document.getElementById('rad-status').innerText = dash.statusText || "Netral";
                document.getElementById('rad-status').style.color = dash.statusText.includes("Uptrend") || dash.statusText.includes("Awal Tren") || dash.statusText.includes("Bull") ? "#00ff00" : (dash.statusText.includes("Downtrend") || dash.statusText.includes("Koreksi") || dash.statusText.includes("Bear") ? "#ff4a4a" : "#fff");

                applyColor('rad-st-net', dash.NetST);
                applyColor('rad-st-sig', dash.sigST);
                
                applyColor('rad-mt-net', dash.NetMT);
                applyColor('rad-mt-sig', dash.sigMT);
                
                applyColor('rad-lt-net', dash.NetLT);
                applyColor('rad-lt-sig', dash.sigLT);

                // Tampilkan Tabel
                table.style.display = 'table';

            } catch (err) {
                errorMsg.innerText = "⚠️ " + err.message;
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        // Jalankan otomatis saat web pertama kali dibuka
        fetchData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grafik Saham & RAD Indicator - LWC Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #131722; color: #d1d4dc; 
            font-family: -apple-system, sans-serif; display: flex; 
            flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        #top-toolbar {
            display: flex; align-items: center; padding: 10px 15px; background: #1e222d; 
            border-bottom: 1px solid #2a2e39; gap: 10px; flex-wrap: wrap; /* Menjadikan responsif */
        }
        
        .toolbar-group { display: flex; align-items: center; gap: 6px; font-size: 13px; }
        
        input[type="text"], select, input[type="range"] {
            background: #2a2e39; color: #d1d4dc; border: 1px solid #363c4e; 
            padding: 6px 8px; border-radius: 4px; font-size: 13px; outline: none; box-sizing: border-box;
        }
        
        input:focus, select:focus { border-color: #2962ff; }
        
        button { 
            background: #2962ff; color: white; cursor: pointer; font-weight: bold; 
            border: none; padding: 6px 12px; border-radius: 4px; transition: 0.2s;
        }
        button:hover { background: #1e53e5; }
        
        #chart-container { display: flex; flex-direction: column; flex: 1; position: relative; }
        #main-chart { width: 100%; flex: 1; position: relative; }
        #rad-chart { width: 100%; height: 30vh; border-top: 1px solid #2a2e39; position: relative; }

        .ui-overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(19,23,34,0.7); z-index: 1000; }
        .ui-overlay.visible { display: flex; }
        .loader { border: 4px solid #2a2e39; border-top: 4px solid #2962ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #rad-dashboard {
            position: absolute; top: 10px; left: 10px; z-index: 999;
            background-color: rgba(19, 23, 34, 0.85); border: 1px solid #363c4e;
            border-radius: 6px; padding: 10px; font-size: 12px; pointer-events: none; display: none;
        }
        #rad-dashboard table { border-collapse: collapse; width: 100%; }
        #rad-dashboard th, #rad-dashboard td { border: 1px solid #363c4e; padding: 4px 8px; text-align: right; }
        #rad-dashboard th { background-color: #2a2e39; color: #fff; text-align: left; }
        
        #status-text { color: #ef5350; font-weight: bold; font-size: 13px; margin-left: auto; }
        
        /* Media Query untuk HP Layar Kecil */
        @media (max-width: 600px) {
            #top-toolbar { justify-content: flex-start; }
            .toolbar-group { flex: 1 1 auto; justify-content: flex-start; }
            #status-text { width: 100%; margin-left: 0; margin-top: 5px; }
            .divider { display: none; } /* Sembunyikan garis pemisah di mobile */
        }
    </style>
</head>
<body>

<div id="top-toolbar">
    <div class="toolbar-group">
        <label>Simbol:</label>
        <input type="text" id="symbol-input" value="BBCA.JK" style="width: 80px; text-transform: uppercase;" />
    </div>
    <div class="toolbar-group">
        <label>TF:</label>
        <select id="interval-input">
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d" selected>1D</option>
            <option value="1wk">1W</option>
            <option value="1mo">1M</option>
        </select>
    </div>
    <button id="load-btn">Load</button>

    <div class="divider" style="border-left: 1px solid #363c4e; height: 20px; margin: 0 5px;"></div>

    <div class="toolbar-group">
        <label>Opasitas Warna:</label>
        <input type="range" id="opacity-input" min="0.1" max="1.0" step="0.05" value="0.85" style="width: 80px;">
    </div>
    <div class="toolbar-group">
        <label>Ukuran Sinyal:</label>
        <select id="marker-size-input">
            <option value="0.5">Kecil</option>
            <option value="1" selected>Normal</option>
            <option value="2">Besar</option>
        </select>
    </div>
    <div id="status-text"></div>
</div>

<div id="chart-container">
    <div id="main-chart"></div>
    <div id="rad-chart"></div>
    
    <div id="rad-dashboard">
        <table>
            <tr><th colspan="3" id="rad-status" style="text-align: center; font-weight: bold; font-size: 13px;">Memuat...</th></tr>
            <tr><th>TF</th><th>Net Vol</th><th>Signal</th></tr>
            <tr><td>ST</td><td id="rad-st-net">0</td><td id="rad-st-sig">0</td></tr>
            <tr><td>MT</td><td id="rad-mt-net">0</td><td id="rad-mt-sig">0</td></tr>
            <tr><td>LT</td><td id="rad-lt-net">0</td><td id="rad-lt-sig">0</td></tr>
        </table>
    </div>
    
    <div id="loading-overlay" class="ui-overlay"><div class="loader"></div></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
    // --- GANTI URL INI JIKA PERLU ---
    const CONFIG = {
        supabaseFunctionUrl: "https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy"
    };

    function formatNumber(num) {
        if (!num || isNaN(num)) return "0";
        let absNum = Math.abs(num);
        if(absNum >= 1e12) return (num / 1e12).toFixed(2) + "T";
        if(absNum >= 1e9) return (num / 1e9).toFixed(2) + "B";
        if(absNum >= 1e6) return (num / 1e6).toFixed(2) + "M";
        if(absNum >= 1e3) return (num / 1e3).toFixed(2) + "K";
        return num.toFixed(2);
    }

    const chartOptions = {
        layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2933' }, horzLines: { color: '#1f2933' } },
        crosshair: { mode: 0 }, 
        timeScale: { timeVisible: true, borderColor: '#2a2e39' },
        rightPriceScale: { borderColor: '#2a2e39' }
    };

    const mainChartElement = document.getElementById('main-chart');
    const mainChart = LightweightCharts.createChart(mainChartElement, chartOptions);
    const candleSeries = mainChart.addCandlestickSeries({ 
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350' 
    });

    const radChartElement = document.getElementById('rad-chart');
    const radChart = LightweightCharts.createChart(radChartElement, {
        ...chartOptions,
        timeScale: { visible: false }
    });

    const xwadSeries = radChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'right' });
    const peloporSeries = radChart.addLineSeries({ color: '#2962FF', lineWidth: 2 });
    const kunciSeries = radChart.addLineSeries({ color: '#FF6D00', lineWidth: 2 });

    // MENAMBAHKAN GARIS NOL (Zero Line) PUTUS-PUTUS
    xwadSeries.createPriceLine({
        price: 0, color: '#808080', lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false,
    });

    mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => { 
        if (range !== null) radChart.timeScale().setVisibleLogicalRange(range); 
    });
    radChart.timeScale().subscribeVisibleLogicalRangeChange(range => { 
        if (range !== null) mainChart.timeScale().setVisibleLogicalRange(range); 
    });

    let dashboardData = {};

    function getParsedColor(index, opacity) {
        const base = { 0: "0, 255, 0", 1: "0, 255, 255", 2: "255, 0, 0", 3: "255, 0, 255", 4: "128, 128, 128" };
        return `rgba(${base[index] || base[4]}, ${opacity})`;
    }

    async function loadData() {
        const symbol = document.getElementById('symbol-input').value.toUpperCase() || "BBCA.JK";
        const interval = document.getElementById('interval-input').value || "1d";
        const opacity = parseFloat(document.getElementById('opacity-input').value);
        const mSize = parseFloat(document.getElementById('marker-size-input').value);
        
        document.getElementById('loading-overlay').classList.add('visible');
        document.getElementById('status-text').innerText = "";

        try {
            const url = new URL(CONFIG.supabaseFunctionUrl);
            url.searchParams.append('endpoint', 'bars');
            url.searchParams.append('symbol', symbol);
            url.searchParams.append('interval', interval);
            
            const now = Math.floor(Date.now() / 1000);
            const isIntraday = interval.includes('m') || interval.includes('h');
            
            // Perbaikan durasi pengambilan data frontend ke backend
            let fromTime;
            if (interval === '1m' || interval === '2m') fromTime = now - (5 * 24 * 60 * 60); 
            else if (isIntraday) fromTime = now - (59 * 24 * 60 * 60); 
            else fromTime = now - (5 * 365 * 24 * 60 * 60);
            
            url.searchParams.append('from', fromTime);
            url.searchParams.append('to', now);
            url.searchParams.append('cb', Date.now()); 

            const res = await fetch(url);
            if (!res.ok) throw new Error("Gagal mengambil data dari server.");
            const data = await res.json();

            if (!data?.chart?.result?.[0] || !data.chart.result[0].timestamp) {
                throw new Error("Data bursa tidak ditemukan.");
            }

            const result = data.chart.result[0];
            const timestamps = result.timestamp;
            const quotes = result.indicators.quote[0];
            const rad = result.indicators.rad || {};

            const candleData = [], markers = [], xwadData = [], peloporData = [], kunciData = [];
            dashboardData = {}; 

            for (let i = 0; i < timestamps.length; i++) {
                let time = timestamps[i]; 
                let o = quotes.open[i], h = quotes.high[i], l = quotes.low[i], c = quotes.close[i];
                
                if (o == null || c == null || isNaN(o) || isNaN(c)) continue;
                if (isNaN(h)) h = Math.max(o, c);
                if (isNaN(l)) l = Math.min(o, c);

                candleData.push({ time, open: o, high: h, low: l, close: c });

                // ======= LOGIK DETEKSI SINYAL BUY / SELL =======
                let isBuy = false, isSell = false;

                // Metode 1: Baca langsung dari server (jika Deno sudah diupdate)
                if (rad.buy && rad.buy[i] === true) isBuy = true;
                if (rad.sell && rad.sell[i] === true) isSell = true;

                // Metode 2 (Fallback): Hitung langsung di Frontend jika server lupa mengembalikan array
                if (!rad.buy && rad.pelopor && rad.kunci && i > 0) {
                    let p_curr = rad.pelopor[i], p_prev = rad.pelopor[i-1];
                    let k_curr = rad.kunci[i], k_prev = rad.kunci[i-1];
                    if (p_curr !== null && k_curr !== null && p_prev !== null && k_prev !== null) {
                        if (p_curr > k_curr && p_prev <= k_prev) isBuy = true;
                        if (p_curr < k_curr && p_prev >= k_prev) isSell = true;
                    }
                }

                // Render Panah Marker
                if (isBuy) markers.push({ time, position: 'belowBar', color: '#1bff91', shape: 'arrowUp', text: 'BUY', size: mSize });
                if (isSell) markers.push({ time, position: 'aboveBar', color: '#FF0000', shape: 'arrowDown', text: 'SELL', size: mSize });
                // ===============================================

                if (rad.xWAD && rad.xWAD[i] !== null && !isNaN(rad.xWAD[i])) {
                    let colIdx = rad.bar_colors ? rad.bar_colors[i] : 4;
                    xwadData.push({ time, value: rad.xWAD[i], color: getParsedColor(colIdx, opacity) });
                    
                    if (rad.pelopor && rad.pelopor[i] !== null && !isNaN(rad.pelopor[i])) peloporData.push({ time, value: rad.pelopor[i] });
                    if (rad.kunci && rad.kunci[i] !== null && !isNaN(rad.kunci[i])) kunciData.push({ time, value: rad.kunci[i] });

                    if (rad.dashboard && rad.dashboard.statusText) {
                        dashboardData[time] = {
                            txt: rad.dashboard.statusText[i],
                            st: rad.dashboard.NetST[i], sst: rad.dashboard.sigST[i],
                            mt: rad.dashboard.NetMT[i], smt: rad.dashboard.sigMT[i],
                            lt: rad.dashboard.NetLT[i], slt: rad.dashboard.sigLT[i],
                        };
                    }
                }
            }

            candleSeries.setData(candleData);
            candleSeries.setMarkers(markers); 
            xwadSeries.setData(xwadData);
            peloporSeries.setData(peloporData);
            kunciSeries.setData(kunciData);

            document.getElementById('rad-dashboard').style.display = 'block';
            if (candleData.length > 0) updateDashboard(candleData[candleData.length - 1].time);

        } catch (error) {
            console.error(error);
            document.getElementById('status-text').innerText = "⚠️ " + error.message;
            candleSeries.setData([]); candleSeries.setMarkers([]);
            xwadSeries.setData([]); peloporSeries.setData([]); kunciSeries.setData([]);
            document.getElementById('rad-dashboard').style.display = 'none';
        } finally {
            document.getElementById('loading-overlay').classList.remove('visible');
        }
    }

    function updateDashboard(time) {
        const d = dashboardData[time];
        if (!d) return;
        document.getElementById('rad-status').innerText = d.txt || "Netral";
        document.getElementById('rad-st-net').innerText = formatNumber(d.st);
        document.getElementById('rad-st-sig').innerText = formatNumber(d.sst);
        document.getElementById('rad-mt-net').innerText = formatNumber(d.mt);
        document.getElementById('rad-mt-sig').innerText = formatNumber(d.smt);
        document.getElementById('rad-lt-net').innerText = formatNumber(d.lt);
        document.getElementById('rad-lt-sig').innerText = formatNumber(d.slt);
    }

    mainChart.subscribeCrosshairMove(p => { if (p.time) updateDashboard(p.time); });
    radChart.subscribeCrosshairMove(p => { if (p.time) updateDashboard(p.time); });

    window.addEventListener('resize', () => {
        mainChart.resize(mainChartElement.clientWidth, mainChartElement.clientHeight);
        radChart.resize(radChartElement.clientWidth, radChartElement.clientHeight);
    });

    document.getElementById('load-btn').addEventListener('click', loadData);
    document.getElementById('symbol-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') loadData();
    });
    
    document.getElementById('interval-input').addEventListener('change', loadData);
    document.getElementById('opacity-input').addEventListener('change', loadData);
    document.getElementById('marker-size-input').addEventListener('change', loadData);

    loadData();
});
</script>
</body>
</html>

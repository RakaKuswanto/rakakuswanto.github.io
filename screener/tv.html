<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grafik Saham & RAD Indicator - Lightweight PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #131722; color: #d1d4dc; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Toolbar */
        #top-toolbar {
            display: flex; align-items: center; padding: 10px 20px; background: #1e222d; border-bottom: 1px solid #2a2e39; gap: 15px; flex-wrap: wrap;
        }
        .toolbar-group { display: flex; align-items: center; gap: 5px; font-size: 13px; }
        input, select, button {
            background: #2a2e39; color: #d1d4dc; border: 1px solid #363c4e; padding: 5px 10px; border-radius: 4px; font-size: 13px; outline: none;
        }
        button { background: #2962ff; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #1e53e5; }
        
        /* Layout */
        #chart-container { display: flex; flex-direction: column; flex: 1; position: relative; }
        #main-chart { width: 100%; flex: 1; position: relative; }
        #rad-chart { width: 100%; height: 28vh; border-top: 1px solid #363c4e; position: relative; }

        /* Dashboard */
        #rad-dashboard {
            position: absolute; top: 10px; left: 10px; z-index: 99;
            background-color: rgba(19, 23, 34, 0.85); border: 1px solid #363c4e;
            border-radius: 6px; padding: 8px; font-size: 11px; pointer-events: none;
        }
        #rad-dashboard table { border-collapse: collapse; }
        #rad-dashboard th, #rad-dashboard td { border: 1px solid #363c4e; padding: 3px 8px; text-align: right; }
        #rad-dashboard th { background-color: #2a2e39; }

        .ui-overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(19,23,34,0.7); z-index: 1000; }
        .ui-overlay.visible { display: flex; }
        .loader { border: 4px solid #2a2e39; border-top: 4px solid #2962ff; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="top-toolbar">
    <div class="toolbar-group">
        <input type="text" id="symbol-input" value="BBCA.JK" placeholder="Kode Saham..." style="width: 90px; text-transform: uppercase;" />
    </div>
    <div class="toolbar-group">
        <select id="interval-input">
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="1d" selected>Daily</option>
            <option value="1wk">Weekly</option>
        </select>
    </div>
    <button id="load-btn">LOAD</button>

    <div style="border-left: 1px solid #363c4e; height: 20px; margin: 0 10px;"></div>

    <div class="toolbar-group">
        <label>Opacity RAD:</label>
        <input type="range" id="opacity-input" min="0.1" max="1.0" step="0.05" value="0.7">
    </div>
    <div class="toolbar-group">
        <label>Marker Size:</label>
        <select id="marker-size-input">
            <option value="1">Kecil</option>
            <option value="2" selected>Normal</option>
            <option value="3">Besar</option>
        </select>
    </div>
</div>

<div id="chart-container">
    <div id="main-chart"></div>
    <div id="rad-chart"></div>
    
    <div id="rad-dashboard">
        <table id="dash-table">
            <tr><th colspan="3" id="rad-status" style="text-align: center; color: #fff;">-</th></tr>
            <tr><th>TF</th><th>Net Vol</th><th>Sig</th></tr>
            <tr><td>ST</td><td id="rad-st-net">0</td><td id="rad-st-sig">0</td></tr>
            <tr><td>MT</td><td id="rad-mt-net">0</td><td id="rad-mt-sig">0</td></tr>
            <tr><td>LT</td><td id="rad-lt-net">0</td><td id="rad-lt-sig">0</td></tr>
        </table>
    </div>
    
    <div id="loading-overlay" class="ui-overlay"><div class="loader"></div></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const CONFIG = { supabaseFunctionUrl: "https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy" };
    let dashboardStore = {};

    // 1. SETUP CHART
    const chartOptions = {
        layout: { background: { color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#242733' }, horzLines: { color: '#242733' } },
        timeScale: { borderColor: '#363c4e', timeVisible: true, secondsVisible: false }
    };

    const mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), chartOptions);
    const candleSeries = mainChart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350' });

    const radChart = LightweightCharts.createChart(document.getElementById('rad-chart'), { ...chartOptions, timeScale: { visible: false } });
    const xwadSeries = radChart.addHistogramSeries({ priceScaleId: 'right' });
    const peloporSeries = radChart.addLineSeries({ color: '#2962FF', lineWidth: 2 });
    const kunciSeries = radChart.addLineSeries({ color: '#FF6D00', lineWidth: 2 });

    // Sync Sync
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => { if(range) radChart.timeScale().setVisibleLogicalRange(range); });
    radChart.timeScale().subscribeVisibleLogicalRangeChange(range => { if(range) mainChart.timeScale().setVisibleLogicalRange(range); });

    // 2. LOGIKA WARNA (RGBA Dinamis)
    function getParsedColor(index, opacity) {
        const base = { 0: "0,255,0", 1: "0,255,255", 2: "255,0,0", 3: "255,0,255", 4: "128,128,128" };
        return `rgba(${base[index] || base[4]}, ${opacity})`;
    }

    // 3. LOAD DATA
    async function loadData() {
        const symbol = document.getElementById('symbol-input').value.toUpperCase();
        const interval = document.getElementById('interval-input').value;
        const opacity = document.getElementById('opacity-input').value;
        const mSize = document.getElementById('marker-size-input').value;

        document.getElementById('loading-overlay').classList.add('visible');

        try {
            const now = Math.floor(Date.now() / 1000);
            let from;
            // FIX ERROR 400: Yahoo membatasi rentang waktu Intraday
            if (interval === '15m') from = now - (59 * 24 * 60 * 60); // Max 60 hari
            else if (interval === '1h') from = now - (720 * 24 * 60 * 60); // Max 730 hari
            else from = now - (5 * 365 * 24 * 60 * 60); // 5 Tahun untuk Daily+

            const url = `${CONFIG.supabaseFunctionUrl}?endpoint=bars&symbol=${symbol}&interval=${interval}&from=${from}&to=${now}&cb=${Date.now()}`;
            
            const res = await fetch(url);
            if (!res.ok) throw new Error("Saham tidak ditemukan atau limit tercapai");
            const data = await res.json();
            const result = data.chart.result[0];
            const rad = result.indicators.rad;

            const candles = [], histograms = [], pelopor = [], kunci = [], markers = [];
            dashboardStore = {};

            result.timestamp.forEach((ts, i) => {
                const q = result.indicators.quote[0];
                if (q.close[i] == null) return;

                const time = ts;
                candles.push({ time, open: q.open[i], high: q.high[i] || q.close[i], low: q.low[i] || q.close[i], close: q.close[i] });

                if (rad) {
                    histograms.push({ time, value: rad.xWAD[i], color: getParsedColor(rad.bar_colors[i], opacity) });
                    pelopor.push({ time, value: rad.pelopor[i] });
                    kunci.push({ time, value: rad.kunci[i] });

                    // MARKERS (BUY/SELL)
                    if (rad.buy[i]) markers.push({ time, position: 'belowBar', color: '#00FF00', shape: 'arrowUp', text: 'BUY', size: mSize });
                    if (rad.sell[i]) markers.push({ time, position: 'aboveBar', color: '#FF0000', shape: 'arrowDown', text: 'SELL', size: mSize });

                    dashboardStore[time] = { 
                        txt: rad.dashboard.statusText[i],
                        st: rad.dashboard.NetST[i], mt: rad.dashboard.NetMT[i], lt: rad.dashboard.NetLT[i],
                        sst: rad.dashboard.sigST[i], smt: rad.dashboard.sigMT[i], slt: rad.dashboard.sigLT[i]
                    };
                }
            });

            candleSeries.setData(candles);
            candleSeries.setMarkers(markers);
            xwadSeries.setData(histograms);
            peloporSeries.setData(pelopor);
            kunciSeries.setData(kunci);

            document.getElementById('rad-dashboard').style.display = 'block';
            updateDashboard(candles[candles.length-1].time);

        } catch (e) {
            alert(e.message);
        } finally {
            document.getElementById('loading-overlay').classList.remove('visible');
        }
    }

    // 4. UI INTERACTION
    function updateDashboard(time) {
        const d = dashboardStore[time];
        if (!d) return;
        document.getElementById('rad-status').innerText = d.txt;
        document.getElementById('rad-st-net').innerText = formatNumber(d.st);
        document.getElementById('rad-mt-net').innerText = formatNumber(d.mt);
        document.getElementById('rad-lt-net').innerText = formatNumber(d.lt);
        document.getElementById('rad-st-sig').innerText = formatNumber(d.sst);
        document.getElementById('rad-mt-sig').innerText = formatNumber(d.smt);
        document.getElementById('rad-lt-sig').innerText = formatNumber(d.slt);
    }

    mainChart.subscribeCrosshairMove(p => { if(p.time) updateDashboard(p.time); });

    document.getElementById('load-btn').onclick = loadData;
    document.getElementById('opacity-input').onchange = loadData;
    document.getElementById('marker-size-input').onchange = loadData;
    document.getElementById('interval-input').onchange = loadData;

    loadData();
});

function formatNumber(num) {
    if (!num || isNaN(num)) return "0";
    let abs = Math.abs(num);
    if (abs >= 1e12) return (num/1e12).toFixed(1)+"T";
    if (abs >= 1e9) return (num/1e9).toFixed(1)+"B";
    if (abs >= 1e6) return (num/1e6).toFixed(1)+"M";
    return Math.round(num).toLocaleString();
}
</script>
</body>
</html>

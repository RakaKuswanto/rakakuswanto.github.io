<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grafik Saham & RAD Indicator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #131722; color: #d1d4dc; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout Pembagian Layar: 70% Chart Utama, 30% Indikator RAD */
        #main-chart { width: 100%; flex: 1; position: relative; }
        #rad-chart { width: 100%; height: 30vh; border-top: 2px solid #2a2e39; position: relative; }

        .ui-overlay { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(19,23,34,0.85); z-index: 1000; }
        .loader { border: 5px solid #2a2e39; border-top: 5px solid #2962ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Dashboard Custom melayang di atas chart */
        #rad-dashboard {
            position: absolute; top: 10px; left: 10px; z-index: 999;
            background-color: rgba(19, 23, 34, 0.9); border: 1px solid #363c4e;
            border-radius: 6px; padding: 10px; font-size: 12px; pointer-events: none;
        }
        #rad-dashboard table { border-collapse: collapse; width: 100%; }
        #rad-dashboard th, #rad-dashboard td { border: 1px solid #363c4e; padding: 5px 10px; text-align: right; }
        #rad-dashboard th { background-color: #2a2e39; color: #fff; text-align: left; }
        #watermark { position: absolute; top: 10px; right: 20px; font-size: 24px; font-weight: bold; color: rgba(255,255,255,0.1); pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div id="main-chart">
    <div id="watermark">BBCA.JK - 1D</div>
</div>
<div id="rad-chart"></div>

<div id="rad-dashboard" style="display: none;">
    <table>
        <tr><th colspan="3" id="rad-status" style="text-align: center; font-weight: bold; font-size: 14px;">Memuat...</th></tr>
        <tr><th>Timeframe</th><th>Net Vol</th><th>Signal</th></tr>
        <tr><td>ST (5)</td><td id="rad-st-net">0</td><td id="rad-st-sig">0</td></tr>
        <tr><td>MT (20)</td><td id="rad-mt-net">0</td><td id="rad-mt-sig">0</td></tr>
        <tr><td>LT (200)</td><td id="rad-lt-net">0</td><td id="rad-lt-sig">0</td></tr>
    </table>
</div>

<div id="loading-overlay" class="ui-overlay"><div class="loader"></div></div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
    const CONFIG = {
        supabaseFunctionUrl: "https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy",
        symbol: "BBCA.JK",
        interval: "1d"
    };

    const colors = {
        0: "#00FF00", // Strong Bull (Lime)
        1: "#00FFFF", // Weak Bull (Aqua)
        2: "#FF0000", // Strong Bear (Red)
        3: "#FF00FF", // Weak Bear (Fuchsia)
        4: "#808080"  // Neutral (Gray)
    };

    function formatNumber(num) {
        if (!num || isNaN(num)) return "0";
        let absNum = Math.abs(num);
        if(absNum >= 1e12) return (num / 1e12).toFixed(2) + "T";
        if(absNum >= 1e9) return (num / 1e9).toFixed(2) + "B";
        if(absNum >= 1e6) return (num / 1e6).toFixed(2) + "M";
        if(absNum >= 1e3) return (num / 1e3).toFixed(2) + "K";
        return num.toFixed(2);
    }

    // Konfigurasi Tema Umum
    const chartOptions = {
        layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: { timeVisible: true, borderColor: '#2a2e39' },
        rightPriceScale: { borderColor: '#2a2e39' }
    };

    // 1. Buat Chart Utama (Candlestick)
    const mainChartElement = document.getElementById('main-chart');
    const mainChart = LightweightCharts.createChart(mainChartElement, chartOptions);
    const candleSeries = mainChart.addCandlestickSeries({ upColor: '#26a69a', downColor: '#ef5350', borderVisible: false, wickUpColor: '#26a69a', wickDownColor: '#ef5350' });

    // 2. Buat Chart Bawah (RAD Oscillator)
    const radChartElement = document.getElementById('rad-chart');
    const radChart = LightweightCharts.createChart(radChartElement, {
        ...chartOptions,
        timeScale: { visible: false } // Sembunyikan sumbu waktu di chart bawah agar rapi
    });

    const xwadSeries = radChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'right' });
    const peloporSeries = radChart.addLineSeries({ color: '#2962FF', lineWidth: 2 });
    const kunciSeries = radChart.addLineSeries({ color: '#FF6D00', lineWidth: 2 });

    // Sinkronisasi Sumbu Waktu (Pindah/Zoom bersamaan)
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => { radChart.timeScale().setVisibleLogicalRange(range); });
    radChart.timeScale().subscribeVisibleLogicalRangeChange(range => { mainChart.timeScale().setVisibleLogicalRange(range); });

    // Global Store untuk Dashboard
    const dashboardData = {};

    // Fetch Data
    async function loadData() {
        try {
            const url = new URL(CONFIG.supabaseFunctionUrl);
            url.searchParams.append('endpoint', 'bars');
            url.searchParams.append('symbol', CONFIG.symbol);
            url.searchParams.append('interval', CONFIG.interval);
            url.searchParams.append('cb', Date.now()); // Anti-cache

            const res = await fetch(url);
            const data = await res.json();

            if (!data?.chart?.result?.[0]) throw new Error("Data kosong dari server");

            const result = data.chart.result[0];
            const timestamps = result.timestamp;
            const quotes = result.indicators.quote[0];
            const rad = result.indicators.rad || {};

            const candleData = [];
            const xwadData = [];
            const peloporData = [];
            const kunciData = [];

            for (let i = 0; i < timestamps.length; i++) {
                let time = timestamps[i]; // Lightweight Chart butuh UNIX Time (detik)
                
                let o = quotes.open[i];
                let c = quotes.close[i];
                if (o == null || c == null || isNaN(o) || isNaN(c)) continue;

                // Push Candlestick
                candleData.push({ time, open: o, high: quotes.high[i] ?? c, low: quotes.low[i] ?? c, close: c });

                // Push Indikator RAD
                if (rad.xWAD && rad.xWAD[i] !== null) {
                    let colIdx = rad.bar_colors ? rad.bar_colors[i] : 4;
                    xwadData.push({ time, value: rad.xWAD[i], color: colors[colIdx] || colors[4] });
                    
                    if (rad.pelopor[i] !== null) peloporData.push({ time, value: rad.pelopor[i] });
                    if (rad.kunci[i] !== null) kunciData.push({ time, value: rad.kunci[i] });

                    // Simpan data dashboard
                    if (rad.dashboard && rad.dashboard.statusText) {
                        dashboardData[time] = {
                            statusText: rad.dashboard.statusText[i],
                            NetST: rad.dashboard.NetST[i], sigST: rad.dashboard.sigST[i],
                            NetMT: rad.dashboard.NetMT[i], sigMT: rad.dashboard.sigMT[i],
                            NetLT: rad.dashboard.NetLT[i], sigLT: rad.dashboard.sigLT[i],
                        };
                    }
                }
            }

            // Set Data ke Grafik
            candleSeries.setData(candleData);
            xwadSeries.setData(xwadData);
            peloporSeries.setData(peloporData);
            kunciSeries.setData(kunciData);

            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('rad-dashboard').style.display = 'block';

            // Set dashboard awal (data terakhir)
            if (candleData.length > 0) updateDashboard(candleData[candleData.length - 1].time);

        } catch (error) {
            console.error("Gagal meload data:", error);
            document.getElementById('loading-overlay').innerHTML = "<div style='color:red;'>Gagal memuat data</div>";
        }
    }

    // Fungsi Update Dashboard
    function updateDashboard(time) {
        const d = dashboardData[time];
        if (!d) return;
        document.getElementById('rad-status').innerText = d.statusText || "Netral";
        document.getElementById('rad-st-net').innerText = formatNumber(d.NetST);
        document.getElementById('rad-st-sig').innerText = formatNumber(d.sigST);
        document.getElementById('rad-mt-net').innerText = formatNumber(d.NetMT);
        document.getElementById('rad-mt-sig').innerText = formatNumber(d.sigMT);
        document.getElementById('rad-lt-net').innerText = formatNumber(d.NetLT);
        document.getElementById('rad-lt-sig').innerText = formatNumber(d.sigLT);
    }

    // Sinkronisasi Crosshair
    function syncCrosshair(param) {
        if (!param.time) return;
        updateDashboard(param.time);
    }

    mainChart.subscribeCrosshairMove(syncCrosshair);
    radChart.subscribeCrosshairMove(syncCrosshair);

    // Handle Resize
    window.addEventListener('resize', () => {
        mainChart.resize(mainChartElement.clientWidth, mainChartElement.clientHeight);
        radChart.resize(radChartElement.clientWidth, radChartElement.clientHeight);
    });

    // Mulai Fetch Data
    loadData();
});
</script>
</body>
</html>

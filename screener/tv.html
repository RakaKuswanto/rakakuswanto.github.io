<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grafik Saham & RAD Indicator - LWC Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #131722; color: #d1d4dc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }
        
        #top-toolbar {
            display: flex; align-items: center; padding: 10px 15px; background: #1e222d; 
            border-bottom: 1px solid #2a2e39; gap: 12px; flex-wrap: wrap; 
        }
        
        .toolbar-group { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
        
        input[type="text"], select, input[type="range"] {
            background: #2a2e39; color: #d1d4dc; border: 1px solid #363c4e; 
            padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; box-sizing: border-box;
            transition: border-color 0.2s ease;
        }
        
        input:focus, select:focus { border-color: #2962ff; }
        
        button { 
            background: #2962ff; color: white; cursor: pointer; font-weight: bold; font-size: 13px;
            border: none; padding: 6px 16px; border-radius: 6px; transition: background 0.2s ease;
        }
        button:hover { background: #1e53e5; }
        button:active { transform: scale(0.98); }
        
        .divider { border-left: 1px solid #363c4e; height: 20px; margin: 0 2px; }

        #chart-container { display: flex; flex-direction: column; flex: 1; position: relative; width: 100%; }
        #main-chart { width: 100%; flex: 1; position: relative; }
        #rad-chart { width: 100%; height: 30vh; border-top: 1px solid #2a2e39; position: relative; }

        .ui-overlay { position: absolute; inset: 0; display: none; justify-content: center; align-items: center; background: rgba(19,23,34,0.7); z-index: 1000; backdrop-filter: blur(2px); }
        .ui-overlay.visible { display: flex; }
        .loader { border: 4px solid #2a2e39; border-top: 4px solid #2962ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #rad-dashboard {
            position: absolute; top: 12px; left: 12px; z-index: 99;
            background-color: rgba(19, 23, 34, 0.85); border: 1px solid #363c4e;
            border-radius: 8px; padding: 12px; font-size: 12px; pointer-events: none; display: none;
            backdrop-filter: blur(4px); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #rad-dashboard table { border-collapse: collapse; width: 100%; }
        #rad-dashboard th, #rad-dashboard td { border: 1px solid #363c4e; padding: 5px 10px; text-align: right; }
        #rad-dashboard th { background-color: #2a2e39; color: #e0e3eb; text-align: left; font-weight: 600; }
        
        #status-text { color: #ef5350; font-weight: bold; font-size: 13px; margin-left: auto; }

        .bg-green { background-color: rgba(38, 166, 154, 0.15) !important; color: #26a69a; font-weight: bold; }
        .bg-red { background-color: rgba(239, 83, 80, 0.15) !important; color: #ef5350; font-weight: bold; }
        
        /* ========================================================= */
        /* --- MEDIA QUERY UNTUK HP / LAYAR KECIL (RESPONSIVE) ---   */
        /* ========================================================= */
        @media (max-width: 768px) {
            #top-toolbar { 
                padding: 10px; gap: 8px; justify-content: space-between;
            }
            .toolbar-group { 
                flex: 1 1 calc(50% - 8px); /* Membagi toolbar jadi 2 kolom */
                justify-content: space-between;
            }
            .toolbar-group label { font-size: 12px; color: #a3a6af; }
            input[type="text"], select, input[type="range"] { 
                width: 100% !important; max-width: 120px; flex: 1;
            }
            #load-btn { 
                flex: 1 1 100%; padding: 10px; font-size: 14px; margin-top: 4px;
            }
            .divider { display: none; }
            #status-text { width: 100%; text-align: center; margin-top: 5px; font-size: 12px; }
            
            /* Penyesuaian Dashboard agar tidak memakan layar di HP */
            #rad-dashboard { 
                top: 8px; left: 8px; padding: 6px; font-size: 10px; border-radius: 6px;
                max-width: 65%; /* Mencegah tabel melebar */
            }
            #rad-dashboard th, #rad-dashboard td { padding: 3px 6px; }
            #rad-chart { height: 25vh; } /* Chart bawah lebih tipis di HP */
        }
    </style>
</head>
<body>

<div id="top-toolbar">
    <div class="toolbar-group">
        <label>Simbol:</label>
        <input type="text" id="symbol-input" value="BBCA.JK" style="width: 80px; text-transform: uppercase;" />
    </div>
    <div class="toolbar-group">
        <label>TF:</label>
        <select id="interval-input">
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d" selected>1D</option>
            <option value="1wk">1W</option>
            <option value="1mo">1M</option>
        </select>
    </div>
    
    <div class="divider"></div>

    <div class="toolbar-group">
        <label>Opasitas:</label>
        <input type="range" id="opacity-input" min="0.1" max="1.0" step="0.05" value="0.85" style="width: 80px;">
    </div>
    <div class="toolbar-group">
        <label>Sinyal:</label>
        <select id="marker-size-input">
            <option value="0.5">Kecil</option>
            <option value="1" selected>Normal</option>
            <option value="2">Besar</option>
        </select>
    </div>
    <div class="toolbar-group">
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
            <input type="checkbox" id="barcolor-toggle" checked style="width: 14px; height: 14px; margin: 0;">
            Warna Bar RAD
        </label>
    </div>
    
    <button id="load-btn">Load Chart</button>
    <div id="status-text"></div>
</div>

<div id="chart-container">
    <div id="main-chart"></div>
    <div id="rad-chart"></div>
    
    <div id="rad-dashboard">
        <table>
            <tr><th colspan="3" id="rad-status" style="text-align: center; font-weight: bold; font-size: 13px; color:#fff;">Memuat...</th></tr>
            <tr><th>TF</th><th>Net Vol</th><th>Status / Signal</th></tr>
            <tr><td>Short Term</td><td id="rad-st-net">0</td><td id="rad-st-sig">0</td></tr>
            <tr><td>Mid Term</td><td id="rad-mt-net">0</td><td id="rad-mt-sig">0</td></tr>
            <tr><td>Long Term</td><td id="rad-lt-net">0</td><td id="rad-lt-sig">0</td></tr>
            <tr>
                <td colspan="3" style="text-align: center; padding: 6px;">
                    <span id="ma3-badge" style="padding: 3px 6px; border-radius: 4px; font-size: 10px; margin-right: 6px; display: none; font-weight: bold;">MA3</span>
                    <span id="ma8-badge" style="padding: 3px 6px; border-radius: 4px; font-size: 10px; display: none; font-weight: bold;">MA8</span>
                </td>
            </tr>
        </table>
    </div>
    
    <div id="loading-overlay" class="ui-overlay"><div class="loader"></div></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
    const CONFIG = {
        supabaseFunctionUrl: "https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy"
    };

    function formatNumber(num) {
        if (!num || isNaN(num)) return "0";
        let absNum = Math.abs(num);
        if(absNum >= 1e12) return (num / 1e12).toFixed(2) + "T";
        if(absNum >= 1e9) return (num / 1e9).toFixed(2) + "B";
        if(absNum >= 1e6) return (num / 1e6).toFixed(2) + "M";
        if(absNum >= 1e3) return (num / 1e3).toFixed(2) + "K";
        return num.toFixed(2);
    }

    const chartOptions = {
        layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2933' }, horzLines: { color: '#1f2933' } },
        crosshair: { mode: 0 }, 
        timeScale: { timeVisible: true, borderColor: '#2a2e39' },
        rightPriceScale: { borderColor: '#2a2e39', autoScale: true } // Memastikan auto-scale aktif
    };

    const mainChartElement = document.getElementById('main-chart');
    const mainChart = LightweightCharts.createChart(mainChartElement, chartOptions);
    const candleSeries = mainChart.addCandlestickSeries({ borderVisible: false });

    const radChartElement = document.getElementById('rad-chart');
    const radChart = LightweightCharts.createChart(radChartElement, { ...chartOptions, timeScale: { visible: false } });

    const xwadSeries = radChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'right' });
    const peloporSeries = radChart.addLineSeries({ color: '#2962FF', lineWidth: 2 });
    const kunciSeries = radChart.addLineSeries({ color: '#FF6D00', lineWidth: 2 });

    xwadSeries.createPriceLine({
        price: 0, color: '#808080', lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false,
    });

    // Sinkronisasi Crosshair TimeScale
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => { 
        if (range !== null) radChart.timeScale().setVisibleLogicalRange(range); 
    });
    radChart.timeScale().subscribeVisibleLogicalRangeChange(range => { 
        if (range !== null) mainChart.timeScale().setVisibleLogicalRange(range); 
    });

    let dashboardData = {};

    function getParsedColor(index, opacity) {
        const base = { 0: "0, 255, 0", 1: "0, 255, 255", 2: "255, 0, 0", 3: "255, 0, 255", 4: "128, 128, 128" };
        return `rgba(${base[index] || base[4]}, ${opacity})`;
    }

    async function loadData() {
        const symbol = document.getElementById('symbol-input').value.toUpperCase() || "BBCA.JK";
        const interval = document.getElementById('interval-input').value || "1d";
        const opacity = parseFloat(document.getElementById('opacity-input').value);
        const mSize = parseFloat(document.getElementById('marker-size-input').value);
        const enableBarColor = document.getElementById('barcolor-toggle').checked; // <--- TAMBAHKAN INI

        document.getElementById('loading-overlay').classList.add('visible');
        document.getElementById('status-text').innerText = "";

        try {
            const url = new URL(CONFIG.supabaseFunctionUrl);
            url.searchParams.append('endpoint', 'bars');
            url.searchParams.append('symbol', symbol);
            url.searchParams.append('interval', interval);
            
            const now = Math.floor(Date.now() / 1000);
            
            let fromTime;
            if (interval === '1m' || interval === '2m') fromTime = now - (6 * 24 * 60 * 60); 
            else if (['5m','15m','30m'].includes(interval)) fromTime = now - (58 * 24 * 60 * 60); 
            else if (['1h','4h'].includes(interval)) fromTime = now - (720 * 24 * 60 * 60);
            else fromTime = now - (5 * 365 * 24 * 60 * 60);
            
            url.searchParams.append('from', fromTime);
            url.searchParams.append('to', now);
            url.searchParams.append('cb', Date.now()); 

            const res = await fetch(url);
            if (!res.ok) throw new Error("Gagal mengambil data dari server.");
            const data = await res.json();

            if (!data?.chart?.result?.[0] || !data.chart.result[0].timestamp) {
                throw new Error("Data bursa tidak ditemukan.");
            }

            const result = data.chart.result[0];
            const timestamps = result.timestamp;
            const quotes = result.indicators.quote[0];
            const rad = result.indicators.rad || {};

            const candleData = [], markers = [], xwadData = [], peloporData = [], kunciData = [];
            dashboardData = {}; 

            for (let i = 0; i < timestamps.length; i++) {
                let time = timestamps[i]; 
                let o = quotes.open[i], h = quotes.high[i], l = quotes.low[i], c = quotes.close[i];
                
                if (o == null || c == null || isNaN(o) || isNaN(c)) continue;
                if (isNaN(h)) h = Math.max(o, c);
                if (isNaN(l)) l = Math.min(o, c);

                let colIdx = (rad.bar_colors && rad.bar_colors[i] !== null) ? rad.bar_colors[i] : 4;
                let hexColor = colIdx === 0 ? "#03c967" : colIdx === 1 ? "#03a5b7" : colIdx === 2 ? "#d1333e" : colIdx === 3 ? "#c23bd9" : "#808080";
                
                if (enableBarColor) {
                    candleData.push({ time, open: o, high: h, low: l, close: c, color: hexColor, wickColor: hexColor, borderColor: hexColor });
                } else {
                    candleData.push({ time, open: o, high: h, low: l, close: c });
                }

                let isBuy = false, isSell = false;

                if (rad.buy && rad.buy[i] === true) isBuy = true;
                if (rad.sell && rad.sell[i] === true) isSell = true;

                if (!rad.buy && rad.pelopor && rad.kunci && i > 0) {
                    let p_curr = rad.pelopor[i], p_prev = rad.pelopor[i-1];
                    let k_curr = rad.kunci[i], k_prev = rad.kunci[i-1];
                    if (p_curr !== null && k_curr !== null && p_prev !== null && k_prev !== null) {
                        if (p_curr > k_curr && p_prev <= k_prev) isBuy = true;
                        if (p_curr < k_curr && p_prev >= k_prev) isSell = true;
                    }
                }

                if (isBuy) markers.push({ time, position: 'belowBar', color: '#1bff91', shape: 'arrowUp', text: 'BUY', size: mSize });
                if (isSell) markers.push({ time, position: 'aboveBar', color: '#FF0000', shape: 'arrowDown', text: 'SELL', size: mSize });

                if (rad.xWAD && rad.xWAD[i] !== null && !isNaN(rad.xWAD[i])) {
                    xwadData.push({ time, value: rad.xWAD[i], color: getParsedColor(colIdx, opacity) });
                    
                    if (rad.pelopor && rad.pelopor[i] !== null && !isNaN(rad.pelopor[i])) peloporData.push({ time, value: rad.pelopor[i] });
                    if (rad.kunci && rad.kunci[i] !== null && !isNaN(rad.kunci[i])) kunciData.push({ time, value: rad.kunci[i] });

                    if (rad.dashboard && rad.dashboard.statusText) {
                        dashboardData[time] = {
                            txt: rad.dashboard.statusText[i],
                            st: rad.dashboard.NetST[i], sst: rad.dashboard.sigST[i],
                            d_st: rad.dashboard.dST ? rad.dashboard.dST[i] : 0,
                            p_st: rad.dashboard.pctST ? rad.dashboard.pctST[i] : 0,
                            
                            mt: rad.dashboard.NetMT[i], smt: rad.dashboard.sigMT[i],
                            d_mt: rad.dashboard.dMT ? rad.dashboard.dMT[i] : 0,
                            p_mt: rad.dashboard.pctMT ? rad.dashboard.pctMT[i] : 0,
                            
                            lt: rad.dashboard.NetLT[i], slt: rad.dashboard.sigLT[i],
                            d_lt: rad.dashboard.dLT ? rad.dashboard.dLT[i] : 0,
                            p_lt: rad.dashboard.pctLT ? rad.dashboard.pctLT[i] : 0,

                            m3: rad.dashboard.ma3 ? rad.dashboard.ma3[i] : null,
                            m8: rad.dashboard.ma8 ? rad.dashboard.ma8[i] : null
                        };
                    }
                }
            }

            candleSeries.setData(candleData);
            candleSeries.setMarkers(markers); 
            xwadSeries.setData(xwadData);
            peloporSeries.setData(peloporData);
            kunciSeries.setData(kunciData);

            // ==============================================================
            // --- UPDATE: AUTO-ZOOM & FIT CONTENT SETIAP GANTI EMITEN ---
            // ==============================================================
            // 1. Matikan sementara auto-scale agar tidak bentrok
            mainChart.applyOptions({ rightPriceScale: { autoScale: false } });
            
            // 2. Beri jeda yang lebih aman (terutama untuk mobile/HP lambat)
            setTimeout(() => {
                // Paskan lebar waktu (Time Scale)
                mainChart.timeScale().fitContent();
                
                // Jika ingin fokus melihat beberapa bulan terakhir saja (bukan seluruh 5 tahun)
                // Hapus komentar 2 baris di bawah ini:
                let visibleBars = Math.min(candleData.length, 50); // Tampilkan 120 candle terakhir
                mainChart.timeScale().setVisibleLogicalRange({ from: candleData.length - visibleBars, to: candleData.length });

                // 3. Nyalakan kembali auto-scale agar harga (Price Scale) pas di layar
                mainChart.applyOptions({ rightPriceScale: { autoScale: true } });
            }, 150); // 150ms biasanya sangat aman untuk memastikan render selesai
            
            document.getElementById('rad-dashboard').style.display = 'block';
            if (candleData.length > 0) updateDashboard(candleData[candleData.length - 1].time);

        } catch (error) {
            console.error(error);
            document.getElementById('status-text').innerText = "⚠️ " + error.message;
            candleSeries.setData([]); candleSeries.setMarkers([]);
            xwadSeries.setData([]); peloporSeries.setData([]); kunciSeries.setData([]);
            document.getElementById('rad-dashboard').style.display = 'none';
        } finally {
            document.getElementById('loading-overlay').classList.remove('visible');
        }
    }

    function updateDashboard(time) {
        const d = dashboardData[time];
        if (!d) return;

        const getDIcon = (val) => val > 0 ? " ⏫" : val < 0 ? " ⏬" : "";
        const getPctTxt = (net, pct, fallbackSig) => {
            if (pct !== undefined && pct !== 0) return (net > 0 ? "Akum " : net < 0 ? "Dist " : "") + pct.toFixed(1) + "%";
            return formatNumber(fallbackSig);
        };

        document.getElementById('rad-status').innerText = d.txt || "Netral";
        
        document.getElementById('rad-st-net').innerText = formatNumber(d.st) + getDIcon(d.d_st);
        document.getElementById('rad-st-net').className = d.st > 0 ? 'bg-green' : (d.st < 0 ? 'bg-red' : '');
        document.getElementById('rad-st-sig').innerText = getPctTxt(d.st, d.p_st, d.sst);

        document.getElementById('rad-mt-net').innerText = formatNumber(d.mt) + getDIcon(d.d_mt);
        document.getElementById('rad-mt-net').className = d.mt > 0 ? 'bg-green' : (d.mt < 0 ? 'bg-red' : '');
        document.getElementById('rad-mt-sig').innerText = getPctTxt(d.mt, d.p_mt, d.smt);

        document.getElementById('rad-lt-net').innerText = formatNumber(d.lt) + getDIcon(d.d_lt);
        document.getElementById('rad-lt-net').className = d.lt > 0 ? 'bg-green' : (d.lt < 0 ? 'bg-red' : '');
        document.getElementById('rad-lt-sig').innerText = getPctTxt(d.lt, d.p_lt, d.slt);

        const m3 = document.getElementById('ma3-badge');
        if (d.m3 !== null) {
            m3.style.display = 'inline-block';
            m3.innerText = "MA3 " + (d.m3 ? "UP" : "DN");
            m3.style.backgroundColor = d.m3 ? "#26a69a" : "#ef5350";
            m3.style.color = "white";
        } else { m3.style.display = 'none'; }

        const m8 = document.getElementById('ma8-badge');
        if (d.m8 !== null) {
            m8.style.display = 'inline-block';
            m8.innerText = "MA8 " + (d.m8 ? "UP" : "DN");
            m8.style.backgroundColor = d.m8 ? "#26a69a" : "#ef5350";
            m8.style.color = "white";
        } else { m8.style.display = 'none'; }
    }

    mainChart.subscribeCrosshairMove(p => { if (p.time) updateDashboard(p.time); });
    radChart.subscribeCrosshairMove(p => { if (p.time) updateDashboard(p.time); });

    window.addEventListener('resize', () => {
        mainChart.resize(mainChartElement.clientWidth, mainChartElement.clientHeight);
        radChart.resize(radChartElement.clientWidth, radChartElement.clientHeight);
    });

    document.getElementById('load-btn').addEventListener('click', loadData);
    document.getElementById('symbol-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') loadData();
    });
    
    document.getElementById('interval-input').addEventListener('change', loadData);
    document.getElementById('opacity-input').addEventListener('input', loadData);
    document.getElementById('marker-size-input').addEventListener('change', loadData);
    document.getElementById('barcolor-toggle').addEventListener('change', loadData);

    loadData();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Chart RAD Responsive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    background: #131722;
    color: #d1d4dc;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* ===================== */
/* TOOLBAR */
/* ===================== */

#top-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
    background: #1e222d;
    border-bottom: 1px solid #2a2e39;
}

.toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
}

input, select, button {
    height: 34px;
    border-radius: 6px;
    border: 1px solid #363c4e;
    background: #2a2e39;
    color: #fff;
    padding: 0 8px;
}

button {
    background: #2962ff;
    font-weight: bold;
    border: none;
}

button:active {
    transform: scale(0.97);
}

/* ===================== */
/* CHART */
/* ===================== */

#chart-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
}

#main-chart {
    flex: 1;
    min-height: 0;
}

#rad-chart {
    height: 25vh;
    min-height: 120px;
    border-top: 1px solid #2a2e39;
}

/* ===================== */
/* DASHBOARD */
/* ===================== */

#rad-dashboard {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(19,23,34,0.9);
    border: 1px solid #363c4e;
    border-radius: 6px;
    font-size: 11px;
    padding: 6px;
    z-index: 10;
}

#rad-dashboard table {
    border-collapse: collapse;
}

#rad-dashboard td, #rad-dashboard th {
    padding: 3px 6px;
    border: 1px solid #363c4e;
}

/* ===================== */
/* MOBILE OPTIMIZATION */
/* ===================== */

@media (max-width: 768px) {

    #top-toolbar {
        flex-direction: column;
        align-items: stretch;
    }

    .toolbar-group {
        justify-content: space-between;
        width: 100%;
    }

    input, select, button {
        width: 100%;
    }

    #rad-dashboard {
        bottom: 10px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
    }

    #rad-chart {
        height: 30vh;
    }
}

/* ===================== */
/* LOADER */
/* ===================== */

.ui-overlay {
    position: absolute;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.6);
}

.ui-overlay.visible {
    display: flex;
}

.loader {
    width: 40px;
    height: 40px;
    border: 4px solid #333;
    border-top: 4px solid #2962ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="top-toolbar">

    <div class="toolbar-group">
        <input type="text" id="symbol-input" value="BBCA.JK">
    </div>

    <div class="toolbar-group">
        <select id="interval-input">
            <option value="15m">15m</option>
            <option value="1h">1h</option>
            <option value="1d" selected>1D</option>
        </select>
    </div>

    <div class="toolbar-group">
        <button id="load-btn">LOAD</button>
    </div>

</div>

<div id="chart-container">
    <div id="main-chart"></div>
    <div id="rad-chart"></div>

    <div id="rad-dashboard">
        <table>
            <tr><th colspan="3" id="rad-status">...</th></tr>
            <tr><td>ST</td><td id="st"></td><td id="sst"></td></tr>
            <tr><td>MT</td><td id="mt"></td><td id="smt"></td></tr>
            <tr><td>LT</td><td id="lt"></td><td id="slt"></td></tr>
        </table>
    </div>

    <div id="loading-overlay" class="ui-overlay">
        <div class="loader"></div>
    </div>
</div>

<script>

const chart = LightweightCharts.createChart(document.getElementById('main-chart'), {
    layout: { background: { color: '#131722' }, textColor: '#fff' },
});

const candle = chart.addCandlestickSeries();

const radChart = LightweightCharts.createChart(document.getElementById('rad-chart'), {
    layout: { background: { color: '#131722' }, textColor: '#fff' },
    timeScale: { visible: false }
});

const hist = radChart.addHistogramSeries();

function resizeAll() {
    chart.resize(
        document.getElementById('main-chart').clientWidth,
        document.getElementById('main-chart').clientHeight
    );

    radChart.resize(
        document.getElementById('rad-chart').clientWidth,
        document.getElementById('rad-chart').clientHeight
    );
}

window.addEventListener('resize', resizeAll);

/* FIX MOBILE TOUCH SCROLL */
document.body.addEventListener('touchmove', function(e) {
    if (e.scale !== 1) e.preventDefault();
}, { passive: false });

/* DUMMY LOAD */
function loadData() {

    document.getElementById('loading-overlay').classList.add('visible');

    setTimeout(() => {

        const data = [];
        const histData = [];

        for (let i = 0; i < 100; i++) {
            data.push({
                time: i,
                open: 100 + i,
                high: 105 + i,
                low: 95 + i,
                close: 102 + i
            });

            histData.push({
                time: i,
                value: Math.random() * 100
            });
        }

        candle.setData(data);
        hist.setData(histData);

        document.getElementById('loading-overlay').classList.remove('visible');

    }, 800);
}

document.getElementById('load-btn').onclick = loadData;

loadData();
resizeAll();

</script>

</body>
</html>

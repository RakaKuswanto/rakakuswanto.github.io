<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grafik Saham & RAD Indicator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./charting_library/charting_library.standalone.js"></script>

    <style>
        body { margin: 0; background: #131722; }
        #tv_chart_container { width: 100%; height: 100vh; }

        .ui-overlay {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: rgba(19,23,34,0.85); z-index: 1000;
        }

        .loader {
            border: 5px solid #2a2e39;
            border-top: 5px solid #2962ff;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div id="tv_chart_container"></div>
<div id="loading-overlay" class="ui-overlay"><div class="loader"></div></div>

<script>

window.radDataStore = {};

// ✅ SAFE NUMBER (ANTI NaN / undefined)
function getSafeNumber(val) {
    const num = Number(val);
    return Number.isFinite(num) ? num : null;
}

document.addEventListener('DOMContentLoaded', function () {

    const CONFIG = {
        supabaseFunctionUrl: "https://yvmfenyirwzmgbzzrbfw.supabase.co/functions/v1/yahoo-tv-proxy",
        defaultSymbol: "BBCA.JK"
    };

    function showLoader() {
        document.getElementById('loading-overlay').style.display = "flex";
    }

    function hideLoader() {
        document.getElementById('loading-overlay').style.display = "none";
    }

    const datafeed = {

        onReady: (cb) => {
            setTimeout(() => cb({
                supported_resolutions: ['1', '5', '15', '30', '60', '1D']
            }), 0);
        },

        resolveSymbol: (symbol, onResolve) => {
            setTimeout(() => onResolve({
                ticker: symbol,
                name: symbol,
                type: "stock",
                session: "0900-1515",
                timezone: "Asia/Jakarta",
                exchange: "IDX",
                minmov: 1,
                pricescale: 100,
                has_intraday: true,
                visible_plots_set: "ohlcv"
            }), 0);
        },

        getBars: async (symbolInfo, resolution, periodParams, onHistory, onError) => {

            showLoader();

            try {
                const url = new URL(CONFIG.supabaseFunctionUrl);
                url.searchParams.append('endpoint', 'bars');
                url.searchParams.append('symbol', symbolInfo.ticker);

                const res = await fetch(url);
                const data = await res.json();

                if (!data?.chart?.result?.[0]) {
                    return onHistory([], { noData: true });
                }

                const result = data.chart.result[0];
                const quotes = result.indicators.quote[0];
                const rad = result.indicators.rad || {};

                const bars = [];

                for (let i = 0; i < result.timestamp.length; i++) {

                    let ts = result.timestamp[i];
                    let time = ts * 1000;

                    let o = getSafeNumber(quotes.open[i]);
                    let h = getSafeNumber(quotes.high[i]);
                    let l = getSafeNumber(quotes.low[i]);
                    let c = getSafeNumber(quotes.close[i]);
                    let v = getSafeNumber(quotes.volume[i]);

                    if (o === null || c === null) continue;

                    // ✅ AMANKAN SEMUA DATA RAD
                    const xwad = getSafeNumber(rad?.xWAD?.[i]);
                    const pelopor = getSafeNumber(rad?.pelopor?.[i]);
                    const kunci = getSafeNumber(rad?.kunci?.[i]);

                    const colorRaw = getSafeNumber(rad?.bar_colors?.[i]);
                    const colorIndex = (colorRaw !== null && colorRaw >= 0 && colorRaw <= 4)
                        ? colorRaw
                        : null;

                    window.radDataStore[time] = {
                        xWAD: xwad,
                        pelopor: pelopor,
                        kunci: kunci,
                        colorIndex: colorIndex
                    };

                    bars.push({
                        time,
                        open: o,
                        high: h ?? c,
                        low: l ?? c,
                        close: c,
                        volume: v ?? 0
                    });
                }

                onHistory(bars, { noData: bars.length === 0 });

            } catch (err) {
                console.error(err);
                onError(err.message);
            } finally {
                hideLoader();
            }
        },

        subscribeBars: () => {},
        unsubscribeBars: () => {}
    };

    const widget = new TradingView.widget({
        container: "tv_chart_container",
        library_path: "./charting_library/",
        datafeed: datafeed,
        symbol: CONFIG.defaultSymbol,
        interval: "1D",
        locale: "en",
        theme: "Dark",
        autosize: true,

        custom_indicators_getter: function (PineJS) {

            return Promise.resolve([{

                name: "RAD",
                metainfo: {
                    _metainfoVersion: 51,
                    id: "RAD@custom",
                    description: "RAD Indicator",
                    isCustomIndicator: true,

                    plots: [
                        { id: "xwad", type: "line" },
                        { id: "pelopor", type: "line" },
                        { id: "kunci", type: "line" },
                        { id: "colorer", type: "colorer", target: "xwad", palette: "p" }
                    ],

                    palettes: {
                        p: {
                            colors: {
                                0: { color: "#00FF00" },
                                1: { color: "#00FFFF" },
                                2: { color: "#FF0000" },
                                3: { color: "#FF00FF" },
                                4: { color: "#808080" }
                            }
                        }
                    },

                    defaults: {
                        styles: {
                            xwad: { linewidth: 2 },
                            pelopor: { linewidth: 2 },
                            kunci: { linewidth: 2 }
                        }
                    }
                },

                constructor: function () {

                    this.init = function (context) {
                        this._context = context;
                    };

                    this.main = function () {

                        let time = PineJS.Std.time(this._context);
                        let d = window.radDataStore[time];

                        // ✅ HARD GUARD TOTAL
                        if (!d) return [null, null, null, null];

                        let x = getSafeNumber(d.xWAD);
                        let p = getSafeNumber(d.pelopor);
                        let k = getSafeNumber(d.kunci);
                        let c = getSafeNumber(d.colorIndex);

                        // ❗ kalau x null → semua null
                        if (x === null) {
                            return [null, null, null, null];
                        }

                        if (c === null) c = 4;

                        return [x, p ?? null, k ?? null, c];
                    };
                }

            }]);
        }
    });

    widget.onChartReady(() => {
        setTimeout(() => {
            widget.chart().createStudy("RAD", false, false);
        }, 500);
    });

});

</script>

</body>
</html>
